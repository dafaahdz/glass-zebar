<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Google Fonts Preload to prevent FOIT/FOUT -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"

    />

      rel="stylesheet"

    <!-- Custom styles. -->
    <link rel="stylesheet" type="text/css" href="./styles.css" />

    <!-- Allows React to be run buildless via "text/babel" script below. -->
    <script
      src="https://unpkg.com/@babel/standalone@7.25.6/babel.min.js"
      integrity="sha256-aS0B0wnsaDByLfE16h4MDCP1fQFccysd1YWOcV+gbBo="
      crossorigin="anonymous"
    ></script>
  </head>
  <body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
      // Play Retro Sound Helper
      window.playRetroSound = () => {
        try {
          const ctx = new (window.AudioContext || window.webkitAudioContext)()
          const osc = ctx.createOscillator()
          const gain = ctx.createGain()
          osc.type = 'square'
          osc.frequency.setValueAtTime(440, ctx.currentTime)
          osc.frequency.exponentialRampToValueAtTime(880, ctx.currentTime + 0.1)
          gain.gain.setValueAtTime(0.05, ctx.currentTime)
          gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1)
          osc.connect(gain)
          gain.connect(ctx.destination)
          osc.start()
          osc.stop(ctx.currentTime + 0.1)
        } catch (e) {
          console.error('Audio API error', e)
        }
      }

      import React, { useState, useEffect, useRef, useMemo } from 'https://esm.sh/react@18?dev'
      import { createRoot } from 'https://esm.sh/react-dom@18/client?dev'
      import confetti from 'https://esm.sh/canvas-confetti@1.9.2'
      import anime from 'https://esm.sh/animejs@3.2.1'
      import * as zebar from 'https://esm.sh/zebar@3.0'

      // Modern IndexedDB Async Storage Helper (2026 Ready!)
      class IndexedDBStore {
        constructor(dbName = 'ZebarPomodoroDB', storeName = 'settings') {
          this.dbName = dbName
          this.storeName = storeName
          this.db = null
        }

        init() {
          if (this.db) return Promise.resolve(this.db)
          return new Promise((resolve, reject) => {
            const request = indexedDB.open(this.dbName, 1)
            request.onupgradeneeded = (e) => {
              const db = e.target.result
              if (!db.objectStoreNames.contains(this.storeName)) {
                db.createObjectStore(this.storeName)
              }
            }
            request.onsuccess = (e) => {
              this.db = e.target.result
              resolve(this.db)
            }
            request.onerror = (e) => reject(e.target.error)
          })
        }

        async get(key, defaultValue) {
          await this.init()
          return new Promise((resolve) => {
            const transaction = this.db.transaction(this.storeName, 'readonly')
            const store = transaction.objectStore(this.storeName)
            const request = store.get(key)
            request.onsuccess = () => {
              resolve(request.result !== undefined ? request.result : defaultValue)
            }
            request.onerror = () => resolve(defaultValue)
          })
        }

        async set(key, value) {
          await this.init()
          return new Promise((resolve, reject) => {
            const transaction = this.db.transaction(this.storeName, 'readwrite')
            const store = transaction.objectStore(this.storeName)
            const request = store.put(value, key)
            request.onsuccess = () => resolve()
            request.onerror = (e) => reject(e.target.error)
          })
        }

        async remove(key) {
          await this.init()
          return new Promise((resolve, reject) => {
            const transaction = this.db.transaction(this.storeName, 'readwrite')
            const store = transaction.objectStore(this.storeName)
            const request = store.delete(key)
            request.onsuccess = () => resolve()
            request.onerror = (e) => reject(e.target.error)
          })
        }
      }

      window.triggerRipple = (event, customColor = 'rgba(245, 158, 11, 0.3)') => {
        const target = event.currentTarget
        if (!target) return

        const rect = target.getBoundingClientRect()
        const x = event.clientX - rect.left
        const y = event.clientY - rect.top

        // Helper to spawn and animate a single ripple circle
        const spawnRipple = (scaleMax, duration, delay, baseOpacity) => {
          const ripple = document.createElement('span')
          ripple.className = 'click-ripple'
          ripple.style.left = `${x}px`
          ripple.style.top = `${y}px`
          ripple.style.background = customColor
          target.appendChild(ripple)

          anime({
            targets: ripple,
            scale: [0, scaleMax],
            opacity: [baseOpacity, 0],
            duration: duration,
            delay: delay,
            easing: 'easeOutQuart',
            complete: () => {
              ripple.remove()
            },
          })
        }

        // Primary Concentric Wave
        spawnRipple(4, 550, 0, 0.8)

        // Echo Ripple Wave (staggered and more translucent)
        spawnRipple(3.2, 500, 120, 0.4)
      }

      const dbStore = new IndexedDBStore()

      // ==========================================
      // ANIMEJS LUXURY ANIMATION SUITE - PHASE 0
      // ==========================================
      const THEME_SPEED_MULTIPLIER = 1.0

      const EASINGS = {
        springMicro: 'spring(1, 120, 15, 0)',
        springExpand: 'spring(1, 80, 12, 0)',
        liquid: 'cubicBezier(0.16, 1, 0.3, 1)',
        easeInOut: 'cubicBezier(0.4, 0, 0.2, 1)',
        linear: 'linear',
        elasticPop: 'easeOutElastic(1, .8)',
      }

      const AnimationManager = {
        instances: new Map(),

        register(id, instance) {
          this.cleanup(id)
          this.instances.set(id, instance)
        },

        cleanup(id) {
          if (this.instances.has(id)) {
            const prev = this.instances.get(id)
            try {
              prev.pause()
              if (prev.animatables) {
                const targets = prev.animatables.map((a) => a.target)
                anime.remove(targets)
              }
            } catch (e) {
              console.warn(`[AnimationManager] Fail clearing instance for ${id}:`, e)
            }
            this.instances.delete(id)
          }
        },

        cleanupAll() {
          for (const [id] of this.instances) {
            this.cleanup(id)
          }
        },
      }

      function useAnime(animeConfig, dependencies = [], customId = null) {
        const elementRef = useRef(null)
        const reactId = React.useId()
        const animationId = customId || `anime-ref-${reactId}`

        useEffect(() => {
          const targets = animeConfig.targets || elementRef.current
          if (!targets) return

          const prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches

          if (prefersReduced) {
            const finalTransforms = {}
            const cssProperties = ['opacity', 'width', 'height', 'scale', 'rotate', 'translateX', 'translateY', 'clipPath']
            
            cssProperties.forEach((prop) => {
              if (animeConfig[prop] !== undefined) {
                const val = animeConfig[prop]
                let endVal = Array.isArray(val) ? val[val.length - 1] : val
                if (endVal && typeof endVal === 'object' && 'value' in endVal) {
                  endVal = endVal.value
                }
                finalTransforms[prop] = endVal
              }
            })

            anime.set(targets, finalTransforms)
            return
          }

          try {
            AnimationManager.cleanup(animationId)

            const resolvedConfig = {
              ...animeConfig,
              targets: targets,
              duration: (animeConfig.duration || 1000) * THEME_SPEED_MULTIPLIER,
            }

            const instance = anime(resolvedConfig)
            AnimationManager.register(animationId, instance)
          } catch (error) {
            console.warn(`[Anime.js Fail] Fallback active for ${animationId}:`, error)
            if (elementRef.current) {
              elementRef.current.classList.add('fallback-css-animation-active')
            }
          }

          return () => {
            AnimationManager.cleanup(animationId)
          }
        }, dependencies)

        return elementRef
      }

      function useFontFaceObserver(fontName) {
        const [loaded, setLoaded] = useState(false)
        useEffect(() => {
          if (!document.fonts) {
            setLoaded(true)
            return
          }
          document.fonts.ready
            .then(() => {
              const isAvailable = document.fonts.check(`12px ${fontName}`)
              setLoaded(isAvailable)
            })
            .catch(() => setLoaded(true))
        }, [fontName])
        return loaded
      }

      const animePrimitives = {
        fadeIn(ref, duration = 400) {
          if (!ref.current) return
          return anime({
            targets: ref.current,
            opacity: [0, 1],
            duration: duration,
            easing: EASINGS.easeInOut,
          })
        },
        bounceOnce(ref, scaleAmt = 1.12, duration = 300) {
          if (!ref.current) return
          return anime({
            targets: ref.current,
            scale: [1, scaleAmt, 1],
            duration: duration,
            easing: EASINGS.elasticPop,
          })
        },
        slideInLeft(ref, duration = 600) {
          if (!ref.current) return
          return anime({
            targets: ref.current,
            translateX: [-50, 0],
            opacity: [0, 1],
            duration: duration,
            easing: EASINGS.springMicro,
          })
        },
      }

      const DebugOverlay = () => {
        const [fps, setFps] = useState(60)
        const [activeAnims, setActiveAnims] = useState(0)
        const [showOverlay, setShowOverlay] = useState(false)

        useEffect(() => {
          let lastTime = performance.now()
          let frames = 0
          let animFrameId

          const calculateFps = () => {
            frames++
            const now = performance.now()
            if (now >= lastTime + 1000) {
              const currentFps = Math.round((frames * 1000) / (now - lastTime))
              setFps(currentFps)
              frames = 0
              lastTime = now
            }

            setActiveAnims(AnimationManager.instances.size)
            animFrameId = requestAnimationFrame(calculateFps)
          }

          const handleShortcut = (e) => {
            if (e.ctrlKey && e.shiftKey && e.key === 'D') {
              setShowOverlay((prev) => !prev)
            }
          }

          window.addEventListener('keydown', handleShortcut)
          animFrameId = requestAnimationFrame(calculateFps)

          return () => {
            window.removeEventListener('keydown', handleShortcut)
            cancelAnimationFrame(animFrameId)
          }
        }, [])

        if (!showOverlay) return null

        return (
          <div className="debug-perf-overlay">
            <span className="debug-stat-item">
              FPS: <strong style={{ color: fps < 55 ? '#f38ba8' : '#a6e3a1' }}>{fps}</strong>
            </span>
            <span className="debug-stat-item">
              Anims: <strong>{activeAnims}</strong>
            </span>
            <button className="debug-cleanup-btn" onClick={() => AnimationManager.cleanupAll()}>
              Cleanup All
            </button>
          </div>
        )
      }

      function useKonamiEasterEgg() {
        useEffect(() => {
          const code = [
            'ArrowUp',
            'ArrowUp',
            'ArrowDown',
            'ArrowDown',
            'ArrowLeft',
            'ArrowRight',
            'ArrowLeft',
            'ArrowRight',
            'b',
            'a',
          ]
          let index = 0

          const handleKeyDown = (e) => {
            if (e.key === code[index]) {
              index++
              if (index === code.length) {
                triggerCelebration()
                index = 0
              }
            } else {
              index = 0
            }
          }

          const triggerCelebration = () => {
            if (window.addToast) {
              window.addToast('🎉 KONAMI MODE ACTIVATED! 🎉', 'nf-md-controller')
            }
            anime({
              targets: '.status-pill',
              translateY: [0, -10, 0],
              rotate: '360deg',
              delay: anime.stagger(100),
              duration: 1200,
              easing: 'spring(1, 100, 10, 0)',
            })
          }

          window.addEventListener('keydown', handleKeyDown)
          return () => window.removeEventListener('keydown', handleKeyDown)
        }, [])
      }

      // Define Zebar Providers
      const providers = zebar.createProviderGroup({
        network: { type: 'network' },
        glazewm: { type: 'glazewm' },
        cpu: { type: 'cpu' },
        date: { type: 'date', formatting: 'EEE d MMM t' },
        battery: { type: 'battery' },
        memory: { type: 'memory' },
        weather: { type: 'weather' },
        media: { type: 'media' },
      })
      // Custom Hook to expose a single unified system data stream with requestAnimationFrame batching
      const useSystemData = () => {
        const [output, setOutput] = useState(providers.outputMap)
        useEffect(() => {
          let frameId = null
          const handleOutput = () => {
            if (frameId) return
            frameId = requestAnimationFrame(() => {
              setOutput({ ...providers.outputMap })
              frameId = null
            })
          }
          const unsubscribe = providers.onOutput(handleOutput)
          return () => {
            unsubscribe()
            if (frameId) cancelAnimationFrame(frameId)
          }
        }, [])
        return output
      }

      // Reusable Status Pill Component
      const StatusPill = ({
        icon,
        value,
        className,
        style,
        extraContent,
        appendContent,
        accessoryIcon,
        ...props
      }) => {
        const pillRef = useRef(null)

        const handleMouseMove = (e) => {
          const rect = e.currentTarget.getBoundingClientRect()
          const x = (e.clientX - rect.left - rect.width / 2) * 0.04
          const y = (e.clientY - rect.top - rect.height / 2) * 0.08
          e.currentTarget.style.setProperty('--magnet-x', `${x}px`)
          e.currentTarget.style.setProperty('--magnet-y', `${y}px`)
        }
        const handleMouseLeave = (e) => {
          e.currentTarget.style.setProperty('--magnet-x', '0px')
          e.currentTarget.style.setProperty('--magnet-y', '0px')
        }

        const handleClick = (e) => {
          window.triggerRipple(e)

          if (pillRef.current) {
            anime.remove(pillRef.current)
            anime({
              targets: pillRef.current,
              scale: [1, 1.05, 1],
              duration: 400,
              easing: 'spring(1, 80, 10, 0)',
            })
          }

          if (props.onClick) props.onClick(e)
        }

        return (
          <div
            className="status-pill-container"
            style={style}
            onMouseMove={handleMouseMove}
            onMouseLeave={handleMouseLeave}
          >
            <div
              ref={pillRef}
              className={`status-pill ${className || ''}`}
              {...props}
              onClick={handleClick}
            >
              {extraContent}
              <i className={`nf ${icon}`}></i>
              {value && <span className="value">{value}</span>}
              {appendContent}
              {accessoryIcon && <i className={`nf ${accessoryIcon} accessory-icon`}></i>}
            </div>
          </div>
        )
      }

      // Network Widget Component (with 500ms Debounced Polling, caching, and log2 optimization)
      const NetworkWidget = React.memo(
        ({ network }) => {
          if (!network) return null

          const [isHovered, setIsHovered] = useState(false)
          const [traffic, setTraffic] = useState({
            transmit: network.traffic?.transmit || 0,
            receive: network.traffic?.receive || 0,
          })

          const containerRef = useRef(null)
          const trafficRef = useRef(null)

          // Debounce network updates to 500ms
          useEffect(() => {
            const handle = setInterval(() => {
              const currentNetwork = providers.outputMap.network
              setTraffic({
                transmit: currentNetwork?.traffic?.transmit || 0,
                receive: currentNetwork?.traffic?.receive || 0,
              })
            }, 500)
            return () => clearInterval(handle)
          }, [])

          // Spring physics expansion drawer orchestrated by Anime.js
          useEffect(() => {
            if (!containerRef.current || !trafficRef.current) return

            const prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches

            if (isHovered) {
              if (prefersReduced) {
                anime.set(containerRef.current, { maxWidth: '400px' })
                anime.set(trafficRef.current, { opacity: 0.8, marginLeft: '8px' })
              } else {
                // 1. Snappy macOS-drawer spring expansion
                const containerAnim = anime({
                  targets: containerRef.current,
                  maxWidth: '400px',
                  duration: 850,
                  easing: 'spring(1, 80, 12, 0)',
                })
                AnimationManager.register('network-container', containerAnim)

                // 2. Staggered elastic entrance bounce for speed texts
                const trafficAnim = anime({
                  targets: trafficRef.current,
                  opacity: [0, 0.8],
                  marginLeft: ['0px', '8px'],
                  translateX: [12, 0],
                  duration: 600,
                  easing: 'easeOutElastic(1, 0.8)',
                  delay: 80,
                })
                AnimationManager.register('network-traffic', trafficAnim)
              }
            } else {
              if (prefersReduced) {
                anime.set(containerRef.current, { maxWidth: '145px' })
                anime.set(trafficRef.current, { opacity: 0, marginLeft: '0px' })
              } else {
                // 1. Sleek fast liquid collapse
                const containerAnim = anime({
                  targets: containerRef.current,
                  maxWidth: '145px',
                  duration: 400,
                  easing: 'cubicBezier(0.16, 1, 0.3, 1)',
                })
                AnimationManager.register('network-container', containerAnim)

                // 2. Quick linear ease-out fade out for speed texts
                const trafficAnim = anime({
                  targets: trafficRef.current,
                  opacity: 0,
                  marginLeft: '0px',
                  translateX: 0,
                  duration: 200,
                  easing: 'easeOutQuad',
                })
                AnimationManager.register('network-traffic', trafficAnim)
              }
            }

            return () => {
              AnimationManager.cleanup('network-container')
              AnimationManager.cleanup('network-traffic')
            }
          }, [isHovered])

          // Super fast bitwise-aligned byte conversion using Math.log2
          const formatBytes = (bytes) => {
            if (bytes === 0 || !bytes) return '0 B/s'
            const sizes = ['B/s', 'KB/s', 'MB/s', 'GB/s']
            const i = Math.floor(Math.log2(bytes) / 10)
            const k = Math.pow(1024, i)
            return parseFloat((bytes / k).toFixed(1)) + ' ' + (sizes[i] || 'B/s')
          }

          const tx = traffic.transmit
          const rx = traffic.receive

          // Cache formatted speeds to bypass recalculations
          const formattedRx = useMemo(() => formatBytes(rx), [rx])
          const formattedTx = useMemo(() => formatBytes(tx), [tx])

          const getNetworkIcon = (networkOutput) => {
            if (networkOutput.vpnConnections?.length > 0) return 'nf-md-vpn'
            if (!networkOutput.defaultInterface) return 'nf-md-wifi_strength_off_outline'
            if (networkOutput.defaultInterface.type === 'ethernet') return 'nf-md-ethernet_cable'
            const signal = networkOutput.defaultGateway?.signalStrength || 0
            if (signal > 80) return 'nf-md-wifi_strength_4'
            if (signal > 60) return 'nf-md-wifi_strength_3'
            if (signal > 40) return 'nf-md-wifi_strength_2'
            if (signal > 20) return 'nf-md-wifi_strength_1'
            return 'nf-md-wifi_strength_outline'
          }

          const signalStrength = network.defaultGateway?.signalStrength || 0
          const networkColor =
            signalStrength > 70
              ? 'var(--ctp-mocha-green)'
              : signalStrength > 40
                ? 'var(--ctp-mocha-yellow)'
                : 'var(--ctp-mocha-peach)'

          return (
            <div
              ref={containerRef}
              className={`network ${isHovered ? 'expanded' : ''}`}
              style={{ '--network-signal-color': networkColor }}
              onMouseEnter={() => setIsHovered(true)}
              onMouseLeave={() => setIsHovered(false)}
            >
              <i className={`nf ${getNetworkIcon(network)}`}></i>
              <span className="network-ssid">{network.defaultGateway?.ssid}</span>
              <span
                ref={trafficRef}
                className={`network-traffic ${isHovered ? 'visible' : ''}`}
              >
                ↓ {formattedRx} ↑ {formattedTx}
              </span>
            </div>
          )
        },
        (prev, next) => {
          if (!prev.network || !next.network) return prev.network === next.network
          return prev.network.defaultGateway?.ssid === next.network.defaultGateway?.ssid
        },
      )

      // Memory Widget Component
      const MemoryWidget = React.memo(
        ({ memory }) => {
          if (!memory) return null

          const usage = Math.round(memory.usage)
          const memoryColor =
            usage > 85
              ? 'var(--kawaii-peach)'
              : usage > 70
                ? 'var(--kawaii-yellow)'
                : 'var(--kawaii-teal)'

          return (
            <StatusPill
              className="memory"
              icon="nf-fae-chip"
              value={`${usage}%`}
              style={{ '--pill-color': memoryColor }}
            />
          )
        },
        (prev, next) => Math.round(prev.memory?.usage || 0) === Math.round(next.memory?.usage || 0),
      )

      // Cyber-Pet / Tamagotchi Widget Component
      const CyberPetWidget = React.memo(
        ({ cpu, memory }) => {
          if (!cpu || !memory) return null

          const cpuUsage = Math.round(cpu.usage)
          const memUsage = Math.round(memory.usage)

          let icon = 'nf-md-cat'
          let color = 'var(--kawaii-teal)'

          if (cpuUsage > 80 || memUsage > 90) {
            icon = 'nf-md-emoticon_sweat'
            color = 'var(--kawaii-peach)'
          } else if (cpuUsage > 60 || memUsage > 75) {
            icon = 'nf-md-emoticon_neutral'
            color = 'var(--kawaii-yellow)'
          } else if (cpuUsage < 10 && memUsage < 50) {
            icon = 'nf-md-sleep'
            color = 'var(--kawaii-lavender)'
          }

          return (
            <StatusPill
              className="cyber-pet"
              icon={icon}
              value={cpuUsage > 80 ? 'HOT' : cpuUsage < 10 ? 'Zzz' : 'UwU'}
              style={{ '--pill-color': color }}
              accessoryIcon="nf-md-heart"
            />
          )
        },
        (prev, next) =>
          Math.round(prev.cpu?.usage || 0) === Math.round(next.cpu?.usage || 0) &&
          Math.round(prev.memory?.usage || 0) === Math.round(next.memory?.usage || 0),
      )

      // CPU Widget Component
      const CpuWidget = React.memo(
        ({ cpu }) => {
          if (!cpu) return null

          const usage = Math.round(cpu.usage)
          return (
            <StatusPill
              className="cpu"
              icon="nf-oct-cpu"
              value={`${usage}%`}
              style={{ '--pill-color': usage > 85 ? 'var(--kawaii-peach)' : 'var(--kawaii-green)' }}
            />
          )
        },
        (prev, next) => Math.round(prev.cpu?.usage || 0) === Math.round(next.cpu?.usage || 0),
      )

      // Battery Widget Component (with robust AC/charging detection and special icons/indicators)
      const BatteryWidget = React.memo(
        ({ battery: zebarBattery }) => {
          const [isHovered, setIsHovered] = useState(false)
          const [fallbackBattery, setFallbackBattery] = useState(null)

          const liquidRef = useRef(null)
          const valueTextRef = useRef(null)
          const tooltipTextRef = useRef(null)

          useEffect(() => {
            if (zebarBattery) return
            let active = true
            let batteryObj = null
            let updateBatteryFn = null

            if (navigator.getBattery) {
              navigator.getBattery().then((bat) => {
                if (!active) return
                batteryObj = bat
                updateBatteryFn = () => {
                  setFallbackBattery({
                    chargePercent: bat.level * 100,
                    isCharging: bat.charging,
                    state: bat.charging ? 'charging' : 'discharging',
                  })
                }
                updateBatteryFn()
                bat.addEventListener('chargingchange', updateBatteryFn)
                bat.addEventListener('levelchange', updateBatteryFn)
              })
            }

            return () => {
              active = false
              if (batteryObj && updateBatteryFn) {
                batteryObj.removeEventListener('chargingchange', updateBatteryFn)
                batteryObj.removeEventListener('levelchange', updateBatteryFn)
              }
            }
          }, [zebarBattery])

          const battery = zebarBattery || fallbackBattery

          console.log('Battery Object in Widget:', battery)

          const level = battery ? Math.round(battery.chargePercent) : 50

          // 1. Battery Liquid Wave Clip-Path Cycle (Anime.js)
          useEffect(() => {
            if (!liquidRef.current || !battery) return

            const prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches

            if (prefersReduced) {
              anime.set(liquidRef.current, {
                clipPath: `polygon(0% 0%, ${level}% 0%, ${level}% 100%, 0% 100%)`
              })
              return
            }

            const l = level
            const lMin1 = Math.max(0, l - 1.5)
            const lMax1 = Math.min(100, l + 1.5)
            const lMin2 = Math.max(0, l - 1.0)
            const lMax2 = Math.min(100, l + 1.0)

            // Start an infinite alternating wave loop
            const anim = anime({
              targets: liquidRef.current,
              clipPath: [
                `polygon(0% 0%, ${lMin1}% 0%, ${lMax2}% 35%, ${lMin1}% 70%, ${lMax2}% 100%, 0% 100%)`,
                `polygon(0% 0%, ${lMax1}% 0%, ${lMin2}% 35%, ${lMax1}% 70%, ${lMin2}% 100%, 0% 100%)`,
              ],
              duration: 2000,
              direction: 'alternate',
              loop: true,
              easing: 'easeInOutSine',
            })
            AnimationManager.register('battery-wave', anim)

            return () => {
              AnimationManager.cleanup('battery-wave')
            }
          }, [level, !!battery])

          // 2. Spring Expand/Collapse Sequence on Hover (Anime.js)
          useEffect(() => {
            if (!valueTextRef.current || !tooltipTextRef.current) return

            const prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches

            if (isHovered) {
              if (prefersReduced) {
                anime.set(valueTextRef.current, { maxWidth: 0, opacity: 0, translateY: -20 })
                anime.set(tooltipTextRef.current, { maxWidth: 130, opacity: 0.8, translateY: 0 })
              } else {
                // Value text flies up and fades out
                const valAnim = anime({
                  targets: valueTextRef.current,
                  maxWidth: 0,
                  opacity: 0,
                  translateY: -20,
                  duration: 500,
                  easing: 'spring(1, 80, 12, 0)',
                })
                AnimationManager.register('battery-value', valAnim)

                // Tooltip text flies up from bottom, fades in
                const tipAnim = anime({
                  targets: tooltipTextRef.current,
                  maxWidth: 130,
                  opacity: 0.8,
                  translateY: 0,
                  duration: 500,
                  delay: 80, // Snappy staggered entrance
                  easing: 'spring(1, 80, 12, 0)',
                })
                AnimationManager.register('battery-tooltip', tipAnim)
              }
            } else {
              if (prefersReduced) {
                anime.set(valueTextRef.current, { maxWidth: 50, opacity: 1, translateY: 0 })
                anime.set(tooltipTextRef.current, { maxWidth: 0, opacity: 0, translateY: 20 })
              } else {
                // Value text flies down from top, fades in
                const valAnim = anime({
                  targets: valueTextRef.current,
                  maxWidth: 50,
                  opacity: 1,
                  translateY: 0,
                  duration: 500,
                  delay: 80, // Snappy staggered entrance
                  easing: 'spring(1, 80, 12, 0)',
                })
                AnimationManager.register('battery-value', valAnim)

                // Tooltip text flies down and fades out
                const tipAnim = anime({
                  targets: tooltipTextRef.current,
                  maxWidth: 0,
                  opacity: 0,
                  translateY: 20,
                  duration: 500,
                  easing: 'spring(1, 80, 12, 0)',
                })
                AnimationManager.register('battery-tooltip', tipAnim)
              }
            }

            return () => {
              AnimationManager.cleanup('battery-value')
              AnimationManager.cleanup('battery-tooltip')
            }
          }, [isHovered])

          if (!battery) return null

          try {
            const stateLower = String(battery.state || '').toLowerCase()
            const isCharging =
              battery.isCharging === true ||
              String(battery.isCharging).toLowerCase() === 'true' ||
              stateLower === 'charging' ||
              stateLower === 'ac' ||
              stateLower === 'full' ||
              stateLower === 'fullycharged' ||
              stateLower === 'fully charged'

            const getBatteryStatusClass = (chargePercent, chargingState) => {
              if (chargingState) return 'battery-charging'
              if (chargePercent <= 15) return 'battery-critical'
              if (chargePercent <= 25) return 'battery-warning'
              return 'battery-high'
            }

            const getBatteryIcon = (chargePercent, chargingState) => {
              if (chargingState) {
                if (chargePercent > 90) return 'nf-md-battery_charging_100'
                if (chargePercent > 70) return 'nf-md-battery_charging_80'
                if (chargePercent > 40) return 'nf-md-battery_charging_60'
                if (chargePercent > 20) return 'nf-md-battery_charging_30'
                return 'nf-md-battery_charging_outline'
              }
              if (chargePercent > 90) return 'nf-fa-battery_4'
              if (chargePercent > 70) return 'nf-fa-battery_3'
              if (chargePercent > 40) return 'nf-fa-battery_2'
              if (chargePercent > 20) return 'nf-fa-battery_1'
              return 'nf-fa-battery_0'
            }

            const chargeStatus = isCharging ? 'Charging' : 'Discharging'
            const tooltipText = `${chargeStatus} (${Math.round(battery.chargePercent)}%)`

            const valueText = isCharging
              ? `⚡ ${Math.round(battery.chargePercent)}%`
              : `${Math.round(battery.chargePercent)}%`

            return (
              <div onMouseEnter={() => setIsHovered(true)} onMouseLeave={() => setIsHovered(false)}>
                <StatusPill
                  className={`battery no-peel ${isHovered ? 'expanded' : ''}`}
                  icon={getBatteryIcon(battery.chargePercent, isCharging)}
                  style={{ '--charge-level': `${battery.chargePercent}%` }}
                  appendContent={
                    <span className="battery-text-container">
                      <span
                        ref={valueTextRef}
                        className="battery-value-text"
                        style={{ transition: 'none' }}
                      >
                        {valueText}
                      </span>
                      <span
                        ref={tooltipTextRef}
                        className="battery-tooltip-text"
                        style={{ transition: 'none' }}
                      >
                        {tooltipText}
                      </span>
                    </span>
                  }
                  extraContent={
                    <>
                      <div className="battery-liquid-container">
                        <div
                          ref={liquidRef}
                          className={`battery-liquid battery-liquid-wave ${getBatteryStatusClass(battery.chargePercent, isCharging)}`}
                        ></div>
                      </div>
                      {isCharging && (
                        <i className="nf nf-md-power_plug charging-icon" style={{ zIndex: 1 }}></i>
                      )}
                    </>
                  }
                />
              </div>
            )
          } catch (err) {
            console.error('BatteryWidget render error:', err)
            return (
              <div className="status-pill" style={{ '--pill-color': 'var(--ctp-mocha-red)' }}>
                <i className="nf nf-md-alert_circle"></i>
                <span className="value">Battery Error</span>
              </div>
            )
          }
        },
        (prev, next) =>
          prev.battery?.chargePercent === next.battery?.chargePercent &&
          prev.battery?.isCharging === next.battery?.isCharging &&
          prev.battery?.state === next.battery?.state,
      )

      // Static mapping of weather statuses to icons (placed outside the render loop to optimize GC cycles)
      const WEATHER_ICONS_MAP = {
        clear_day: 'nf-weather-day_sunny',
        clear_night: 'nf-weather-night_clear',
        cloudy_day: 'nf-weather-day_cloudy',
        cloudy_night: 'nf-weather-night_alt_cloudy',
        light_rain_day: 'nf-weather-day_sprinkle',
        light_rain_night: 'nf-weather-night_alt_sprinkle',
        heavy_rain_day: 'nf-weather-day_rain',
        heavy_rain_night: 'nf-weather-night_alt_rain',
        snow_day: 'nf-weather-day_snow',
        snow_night: 'nf-weather-night_alt_snow',
        thunder_day: 'nf-weather-day_lightning',
        thunder_night: 'nf-weather-night_alt_lightning',
      }

      // Weather Widget Component
      const WeatherWidget = React.memo(
        ({ weather }) => {
          if (!weather) return null

          const [isHovered, setIsHovered] = useState(false)
          const canvasRef = useRef(null)

          useEffect(() => {
            if (!canvasRef.current) return

            const canvas = canvasRef.current
            const ctx = canvas.getContext('2d')
            let rect = canvas.getBoundingClientRect()
            
            // Set scale for high-DPI displays
            const dpr = window.devicePixelRatio || 1
            
            const initCanvas = () => {
              rect = canvas.getBoundingClientRect()
              canvas.width = rect.width * dpr
              canvas.height = rect.height * dpr
              ctx.scale(dpr, dpr)
            }

            initCanvas()

            const w = rect.width
            const h = rect.height

            // Initialize particles based on weather type
            const status = String(weather.status || '').toLowerCase()
            const particles = []
            
            if (status.includes('rain') || status.includes('sprinkle') || status.includes('drizzle')) {
              for (let i = 0; i < 8; i++) {
                particles.push({
                  x: Math.random() * w,
                  y: Math.random() * h - h,
                  len: 4 + Math.random() * 6,
                  speed: 4 + Math.random() * 4, // Doubled speed for 30fps frame capping
                  opacity: 0.15 + Math.random() * 0.25,
                })
              }
            } else if (status.includes('snow') || status.includes('ice') || status.includes('frost')) {
              for (let i = 0; i < 6; i++) {
                particles.push({
                  x: Math.random() * w,
                  y: Math.random() * h - h,
                  r: 1.0 + Math.random() * 1.5,
                  speed: 0.8 + Math.random() * 1.0, // Doubled speed for 30fps frame capping
                  wiggle: Math.random() * 100,
                  opacity: 0.2 + Math.random() * 0.4,
                })
              }
            } else if (status.includes('clear') || status.includes('sunny')) {
              // Sunny rotating ray rays
              particles.push({
                angle: 0,
                speed: 0.012, // Doubled speed for 30fps frame capping
              })
            }

            let animId = null
            let fadeOpacity = isHovered ? 1 : 0
            let lastDrawTime = 0
            const fpsInterval = 1000 / 30 // Capping to 30fps

            const draw = (timestamp) => {
              const now = timestamp || performance.now()
              const elapsed = now - lastDrawTime

              if (elapsed < fpsInterval) {
                if (isHovered || fadeOpacity > 0) {
                  animId = requestAnimationFrame(draw)
                }
                return
              }

              lastDrawTime = now - (elapsed % fpsInterval)

              ctx.clearRect(0, 0, w, h)
              ctx.globalAlpha = fadeOpacity

              // Smoothly fade particles in and out depending on hover state
              if (isHovered && fadeOpacity < 1) {
                fadeOpacity = Math.min(1, fadeOpacity + 0.08)
              } else if (!isHovered && fadeOpacity > 0) {
                fadeOpacity = Math.max(0, fadeOpacity - 0.08)
              }

              // Only render and run simulation if particles are visible
              if (fadeOpacity > 0) {
                if (status.includes('rain') || status.includes('sprinkle') || status.includes('drizzle')) {
                  ctx.strokeStyle = 'rgba(137, 180, 250, 0.45)' // ctp blue
                  ctx.lineWidth = 1.0
                  particles.forEach((p) => {
                    ctx.beginPath()
                    ctx.moveTo(p.x, p.y)
                    ctx.lineTo(p.x - 0.5, p.y + p.len)
                    ctx.stroke()

                    p.y += p.speed
                    p.x -= 0.25 // diagonal drift
                    if (p.y > h) {
                      p.y = -p.len
                      p.x = Math.random() * w
                    }
                  })
                } else if (status.includes('snow') || status.includes('ice') || status.includes('frost')) {
                  ctx.fillStyle = 'rgba(137, 226, 252, 0.6)' // ctp sky
                  particles.forEach((p) => {
                    ctx.beginPath()
                    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2)
                    ctx.fill()

                    p.y += p.speed
                    p.wiggle += 0.04
                    p.x += Math.sin(p.wiggle) * 0.2
                    if (p.y > h) {
                      p.y = -p.r
                      p.x = Math.random() * w
                    }
                  })
                } else if (status.includes('clear') || status.includes('sunny')) {
                  ctx.fillStyle = 'rgba(249, 226, 175, 0.06)' // ctp yellow
                  const p = particles[0]
                  if (p) {
                    p.angle += p.speed
                    ctx.save()
                    ctx.translate(w / 4, h / 2) // center near icon
                    ctx.rotate(p.angle)
                    for (let j = 0; j < 6; j++) {
                      ctx.rotate(Math.PI / 3)
                      ctx.beginPath()
                      ctx.moveTo(0, 0)
                      ctx.lineTo(12, -3)
                      ctx.lineTo(12, 3)
                      ctx.fill()
                    }
                    ctx.restore()
                  }
                } else {
                  // Cloudy/Other: Gentle breathing glass fog
                  ctx.fillStyle = 'rgba(148, 226, 213, 0.05)' // ctp teal
                  ctx.beginPath()
                  ctx.arc(w / 2, h / 2, Math.sin(Date.now() * 0.0015) * 8 + 18, 0, Math.PI * 2)
                  ctx.fill()
                }
              }

              // Keep loop running if hovered, or during transition out
              if (isHovered || fadeOpacity > 0) {
                animId = requestAnimationFrame(draw)
              } else {
                ctx.clearRect(0, 0, w, h)
                cancelAnimationFrame(animId)
              }
            }

            animId = requestAnimationFrame(draw)
            return () => {
              if (animId) cancelAnimationFrame(animId)
            }
          }, [isHovered, weather.status])

          const getWeatherColor = (status) => {
            if (!status) return 'var(--ctp-mocha-subtext0)'
            const s = status.toLowerCase()
            if (s.includes('clear') || s.includes('sunny')) {
              return 'var(--ctp-mocha-yellow)'
            }
            if (s.includes('thunder') || s.includes('lightning')) {
              return 'var(--ctp-mocha-mauve)'
            }
            if (s.includes('rain') || s.includes('drizzle') || s.includes('sprinkle')) {
              return 'var(--ctp-mocha-blue)'
            }
            if (s.includes('snow') || s.includes('ice') || s.includes('frost')) {
              return 'var(--ctp-mocha-sky)'
            }
            if (s.includes('cloud')) {
              return 'var(--ctp-mocha-teal)'
            }
            return 'var(--ctp-mocha-subtext0)'
          }

          const weatherColor = getWeatherColor(weather.status)

          return (
            <div
              onMouseEnter={() => setIsHovered(true)}
              onMouseLeave={() => setIsHovered(false)}
              className="status-pill-container"
              style={{ display: 'inline-block' }}
            >
              <div className="status-pill weather" style={{ '--weather-accent-color': weatherColor }}>
                <canvas ref={canvasRef} className="weather-canvas" />
                <i className={`nf ${WEATHER_ICONS_MAP[weather.status] || 'nf-weather-na'}`} style={{ zIndex: 1 }}></i>
                <span className="value" style={{ zIndex: 1 }}>{`${Math.round(weather.celsiusTemp)}°C`}</span>
              </div>
            </div>
          )
        },
        (prev, next) =>
          prev.weather?.celsiusTemp === next.weather?.celsiusTemp &&
          prev.weather?.status === next.weather?.status,
      )

      // Workspace Widget Component (with deep structural comparison to bypass redundant render sweeps)
      const WorkspaceWidget = React.memo(
        ({ glazewm }) => {
          if (!glazewm) return null

          const containerRef = useRef(null)
          const indicatorRef = useRef(null)
          const prevLeftRef = useRef(0)

          const focusedWorkspaceName = useMemo(() => {
            return glazewm.currentWorkspaces.find((w) => w.hasFocus)?.name
          }, [glazewm.currentWorkspaces])

          // 1. Sliding indicator animation with squish/stretch
          useEffect(() => {
            if (!containerRef.current || !indicatorRef.current || !focusedWorkspaceName) return

            // Query the DOM for the newly focused workspace button
            const activeBtn = containerRef.current.querySelector('.workspace.focused')
            if (!activeBtn) return

            const activeRect = activeBtn.getBoundingClientRect()
            const containerRect = containerRef.current.getBoundingClientRect()

            const leftOffset = activeRect.left - containerRect.left
            const width = activeRect.width

            const prevLeft = prevLeftRef.current
            const direction = leftOffset > prevLeft ? 1 : -1
            prevLeftRef.current = leftOffset

            const prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches

            if (prefersReduced) {
              anime.set(indicatorRef.current, {
                left: `${leftOffset}px`,
                width: `${width}px`,
                scaleX: 1,
                scaleY: 1,
                skewX: 0
              })
            } else {
              // Animate indicator positions with liquid squish/stretch jelly
              const anim = anime({
                targets: indicatorRef.current,
                left: `${leftOffset}px`,
                width: `${width}px`,
                scaleX: [1, 1.3, 0.96, 1],
                scaleY: [1, 0.85, 1.04, 1],
                skewX: [0, direction * 8, 0],
                duration: 450,
                easing: 'spring(1, 120, 16, 0)',
              })
              AnimationManager.register('workspace-indicator', anim)
            }

            return () => {
              AnimationManager.cleanup('workspace-indicator')
            }
          }, [focusedWorkspaceName])

          // 2. Outward radial staggered scale bounce ripple on focus shift
          useEffect(() => {
            if (!containerRef.current || !focusedWorkspaceName) return

            const buttons = containerRef.current.querySelectorAll('.workspace')
            const activeIndex = glazewm.currentWorkspaces.findIndex((w) => w.hasFocus)

            if (activeIndex >= 0 && buttons.length > 0) {
              const prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches

              if (prefersReduced) {
                anime.set(buttons, { scale: 1 })
                return
              }

              const anim = anime({
                targets: buttons,
                scale: [1, 1.05, 1],
                delay: anime.stagger(22, { from: activeIndex }),
                easing: 'spring(1, 120, 15, 0)',
              })
              AnimationManager.register('workspace-buttons-bounce', anim)
            }

            return () => {
              AnimationManager.cleanup('workspace-buttons-bounce')
            }
          }, [focusedWorkspaceName])

          return (
            <div ref={containerRef} className="workspaces">
              <div ref={indicatorRef} className="workspace-liquid-indicator" />
              {glazewm.currentWorkspaces.map((workspace) => (
                <button
                  className={`workspace ${workspace.hasFocus && 'focused'} ${workspace.isDisplayed && 'displayed'}`}
                  onClick={(e) => {
                    window.playRetroSound()
                    window.triggerRipple(e, 'rgba(245, 158, 11, 0.3)')
                    glazewm.runCommand(`focus --workspace ${workspace.name}`)
                  }}
                  key={workspace.name}
                  style={{ transformOrigin: 'center' }}
                >
                  <span className="workspace-text">{workspace.displayName ?? workspace.name}</span>
                </button>
              ))}
            </div>
          )
        },
        (prev, next) => {
          if (!prev.glazewm || !next.glazewm) return prev.glazewm === next.glazewm
          const p = prev.glazewm.currentWorkspaces
          const n = next.glazewm.currentWorkspaces
          if (p.length !== n.length) return false
          for (let i = 0; i < p.length; i++) {
            if (
              p[i].name !== n[i].name ||
              p[i].hasFocus !== n[i].hasFocus ||
              p[i].isDisplayed !== n[i].isDisplayed ||
              p[i].displayName !== n[i].displayName
            ) {
              return false
            }
          }
          return true
        },
      )

      // Binding Mode Button Component with premium fast scale-up and fade-in entry animation
      // Binding Mode Button Component with premium fast scale-up and fade-in entry animation
      const BindingModeBtn = React.memo(({ bindingMode, runCommand }) => {
        const ref = useRef(null)

        useEffect(() => {
          if (!ref.current) return

          const prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches
          const id = 'binding-mode-btn-' + bindingMode.name

          if (prefersReduced) {
            anime.set(ref.current, { scale: 1, opacity: 1 })
          } else {
            const anim = anime({
              targets: ref.current,
              scale: [0.85, 1],
              opacity: [0, 1],
              duration: 350,
              easing: 'easeOutQuart',
            })
            AnimationManager.register(id, anim)
          }

          return () => {
            AnimationManager.cleanup(id)
          }
        }, [bindingMode.name])

        return (
          <button
            ref={ref}
            className="binding-mode"
            onClick={() => runCommand(`wm-disable-binding-mode --name ${bindingMode.name}`)}
            style={{ transformOrigin: 'center', opacity: 0 }}
          >
            {bindingMode.displayName ?? bindingMode.name}
          </button>
        )
      })

      // Tiling Direction Button Component with snappy 180 degree rotation
      const TilingDirectionBtn = React.memo(({ tilingDirection, runCommand }) => {
        const ref = useRef(null)
        const prevDir = useRef(tilingDirection)

        useEffect(() => {
          if (!ref.current) return
          if (prevDir.current !== tilingDirection) {
            const prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches

            if (prefersReduced) {
              anime.set(ref.current, {
                rotate: tilingDirection === 'horizontal' ? 360 : 180
              })
            } else {
              const anim = anime({
                targets: ref.current,
                rotate: tilingDirection === 'horizontal' ? [180, 360] : [0, 180],
                duration: 450,
                easing: 'cubicBezier(0.16, 1, 0.3, 1)', // Snappy ultra-premium ease-out expo
              })
              AnimationManager.register('tiling-direction-btn', anim)
            }
            prevDir.current = tilingDirection
          }

          return () => {
            AnimationManager.cleanup('tiling-direction-btn')
          }
        }, [tilingDirection])

        return (
          <button
            ref={ref}
            className={`tiling-direction nf ${
              tilingDirection === 'horizontal' ? 'nf-md-swap_horizontal' : 'nf-md-swap_vertical'
            }`}
            onClick={() => runCommand('toggle-tiling-direction')}
            style={{ transformOrigin: 'center' }}
          ></button>
        )
      })

      // GlazeWM Control Actions Widget (fully memoized to completely avoid GC allocations during normal runtime)
      const GlazeControlsWidget = React.memo(
        ({ glazewm }) => {
          if (!glazewm) return null

          return (
            <>
              {glazewm.isPaused && (
                <button
                  className="paused-button"
                  onClick={() => glazewm.runCommand('wm-toggle-pause')}
                >
                  PAUSED
                </button>
              )}
              {glazewm.bindingModes.map((bindingMode) => (
                <BindingModeBtn
                  key={bindingMode.name}
                  bindingMode={bindingMode}
                  runCommand={glazewm.runCommand}
                />
              ))}

              <TilingDirectionBtn
                tilingDirection={glazewm.tilingDirection}
                runCommand={glazewm.runCommand}
              />
            </>
          )
        },
        (prev, next) => {
          if (!prev.glazewm || !next.glazewm) return prev.glazewm === next.glazewm
          const p = prev.glazewm
          const n = next.glazewm
          if (p.isPaused !== n.isPaused) return false
          if (p.tilingDirection !== n.tilingDirection) return false
          if (p.bindingModes.length !== n.bindingModes.length) return false
          for (let i = 0; i < p.bindingModes.length; i++) {
            if (
              p.bindingModes[i].name !== n.bindingModes[i].name ||
              p.bindingModes[i].displayName !== n.bindingModes[i].displayName
            ) {
              return false
            }
          }
          return true
        },
      )
 
      // GlazeWM Focused Window Widget with dynamic details and control actions
      const GlazeWindowWidget = React.memo(
        ({ glazewm }) => {
          if (!glazewm || !glazewm.focusedContainer) return null

          const { title } = glazewm.focusedContainer
          if (!title) return null

          // Truncate title to fit without layout breaks
          const truncatedTitle = title.length > 20 ? title.substring(0, 18) + '...' : title

          return (
            <div className="status-pill glaze-window-pill" style={{ '--pill-color': 'var(--kawaii-teal)' }}>
              <i className="nf nf-md-application_outline"></i>
              <span className="value">{truncatedTitle}</span>
              <div className="window-controls">
                <button
                  className="win-btn win-float"
                  title="Toggle Floating"
                  onClick={() => glazewm.runCommand('toggle-floating')}
                >
                  <i className="nf nf-md-dock_window"></i>
                </button>
                <button
                  className="win-btn win-minimize"
                  title="Minimize"
                  onClick={() => glazewm.runCommand('toggle-minimized')}
                >
                  <i className="nf nf-md-minus"></i>
                </button>
                <button
                  className="win-btn win-maximize"
                  title="Fullscreen"
                  onClick={() => glazewm.runCommand('toggle-fullscreen')}
                >
                  <i className="nf nf-md-window_maximize"></i>
                </button>
                <button
                  className="win-btn win-close"
                  title="Close Window"
                  onClick={() => glazewm.runCommand('close')}
                >
                  <i className="nf nf-md-close"></i>
                </button>
              </div>
            </div>
          )
        },
        (prev, next) => {
          if (!prev.glazewm || !next.glazewm) return prev.glazewm === next.glazewm
          return prev.glazewm.focusedContainer?.id === next.glazewm.focusedContainer?.id &&
                 prev.glazewm.focusedContainer?.title === next.glazewm.focusedContainer?.title
        }
      )

      // Kinetic Ticker Digit Component (Opsi G)
      const TickerDigit = React.memo(({ digit }) => {
        const isNumber = /\d/.test(digit)
        if (!isNumber) {
          const isSeparator = digit === ':' || digit === '/' || digit === '-'
          return (
            <span
              className={isSeparator ? 'clock-separator' : 'clock-text-char'}
              style={{ display: 'inline-block', minWidth: digit === ' ' ? '4px' : 'auto' }}
            >
              {digit}
            </span>
          )
        }

        const stripRef = useRef(null)
        const prevDigit = useRef(digit)
        const [displayDigits, setDisplayDigits] = useState([digit, digit])

        useEffect(() => {
          if (digit === prevDigit.current) return

          const prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches

          if (prefersReduced) {
            setDisplayDigits([digit, digit])
            if (stripRef.current) {
              anime.set(stripRef.current, { translateY: 0 })
            }
            prevDigit.current = digit
            return
          }

          // Setup old digit at top, new digit at bottom
          setDisplayDigits([prevDigit.current, digit])
          if (stripRef.current) {
            anime.set(stripRef.current, { translateY: 0 })

            const anim = anime({
              targets: stripRef.current,
              translateY: -14, // height of digital ticker
              duration: 550,
              easing: 'spring(1, 100, 15, 0)',
              complete: () => {
                setDisplayDigits([digit, digit])
                anime.set(stripRef.current, { translateY: 0 })
              },
            })
            AnimationManager.register(stripRef.current, anim)
          }

          prevDigit.current = digit

          return () => {
            if (stripRef.current) {
              AnimationManager.cleanup(stripRef.current)
            }
          }
        }, [digit])

        return (
          <span className="ticker-digit-container">
            <span ref={stripRef} className="ticker-digit-strip">
              <span>{displayDigits[0]}</span>
              <span>{displayDigits[1]}</span>
            </span>
          </span>
        )
      })

      // Isolated Clock Widget Component (prevents main parent DOM sweeps on second updates)
      const ClockWidget = React.memo(
        ({ date }) => {
          if (!date) return null
          
          const digits = date.formatted.split('')

          return (
            <StatusPill
              className="clock-capsule"
              icon="nf-md-clock_outline"
              value={
                <span className="clock-ticker-display" style={{ display: 'inline-flex', alignItems: 'center' }}>
                  {digits.map((char, index) => (
                    <TickerDigit key={index} digit={char} />
                  ))}
                </span>
              }
            />
          )
        },
        (prev, next) => prev.date?.formatted === next.date?.formatted,
      )

      // Helper function for ultra-fast 1-pixel HTML5 canvas dominant color average extraction
      const extractDominantColor = (imgUrl) => {
        return new Promise((resolve) => {
          const img = new Image()
          img.crossOrigin = 'Anonymous'
          img.onload = () => {
            try {
              const canvas = document.createElement('canvas')
              canvas.width = 1
              canvas.height = 1
              const ctx = canvas.getContext('2d')
              ctx.drawImage(img, 0, 0, 1, 1)
              const [r, g, b] = ctx.getImageData(0, 0, 1, 1).data
              // Translucent overlay color for high contrast premium CRT background glows
              resolve(`rgba(${r}, ${g}, ${b}, 0.38)`)
            } catch (e) {
              resolve('rgba(255, 255, 255, 0.03)')
            }
          }
          img.onerror = () => resolve('rgba(255, 255, 255, 0.03)')
          img.src = imgUrl
        })
      }

      // Helper function to clean up artist and track titles from streaming platform noise
      const cleanMetadata = (text) => {
        if (!text) return ''
        // Split by Em-dash, En-dash, or a space-hyphen-space separator to isolate primary artist/track
        let cleaned = text.split(/\s*[\u2014\u2013]\s*|\s+-\s+/)[0]

        // Strip bracketed features or formats, e.g. (feat. ...), [Official Video]
        cleaned = cleaned.replace(/\s*[\(\[][fF]eat\..*?[\)\]]/g, '')
        cleaned = cleaned.replace(/\s*[\(\[][fF]t\..*?[\)\]]/g, '')
        cleaned = cleaned.replace(/\s*[\(\[][oO]fficial.*?[\)\]]/g, '')
        cleaned = cleaned.replace(/\s*-\s*Remastered.*/gi, '')
        cleaned = cleaned.replace(/\s*[\(\[]Remastered.*?[\)\]]/gi, '')
        cleaned = cleaned.replace(/\s*-\s*Single\s+Version/gi, '')
        cleaned = cleaned.replace(/\s*-\s*Radio\s+Edit/gi, '')

        return cleaned.trim()
      }

      // Memoized Media & Marquee Track Widget (isolates layout bounds and scroll calculations)
      const MediaWidget = React.memo(
        ({
          media,
          lastfmUsername,
          setLastfmUsername,
          lastfmApiKey,
          setLastfmApiKey,
          albumCover,
          playCount,
          dominantColor,
        }) => {
          if (!media?.currentSession) return null

          const containerRef = useRef(null)
          const textRef = useRef(null)
          const [isHovered, setIsHovered] = useState(false)
          const [shouldScroll, setShouldScroll] = useState(false)
          const isFontLoaded = useFontFaceObserver('Outfit')
          const speedRef = useRef(0.5)
          const posXRef = useRef(0)

          // Local UI / Config States inside MediaWidget
          const [todayScrobbles, setTodayScrobbles] = useState(null)
          const [showTodayScrobbles, setShowTodayScrobbles] = useState(false)
          const [isInlineSettingsOpen, setIsInlineSettingsOpen] = useState(false)
          const [usernameInput, setUsernameInput] = useState(lastfmUsername)
          const [apiKeyInput, setApiKeyInput] = useState(lastfmApiKey)

          // Sync local settings inputs when parent finishes loading from IndexedDB
          useEffect(() => {
            setUsernameInput(lastfmUsername)
            setApiKeyInput(lastfmApiKey)
          }, [lastfmUsername, lastfmApiKey])

          // Fetch today's scrobbles
          const fetchTodayScrobbles = async () => {
            if (!lastfmApiKey || !lastfmUsername) return
            try {
              const midnight = Math.floor(new Date().setHours(0, 0, 0, 0) / 1000)
              const url = `https://ws.audioscrobbler.com/2.0/?method=user.getrecenttracks&user=${lastfmUsername}&api_key=${lastfmApiKey}&from=${midnight}&limit=1&format=json`
              const res = await fetch(url)
              const data = await res.json()
              if (data?.recenttracks?.['@attr']?.total) {
                setTodayScrobbles(parseInt(data.recenttracks['@attr'].total))
              } else {
                setTodayScrobbles(0)
              }
            } catch (err) {
              console.error('Error fetching today scrobbles:', err)
            }
          }

          const handleStatsRightClick = (e) => {
            e.preventDefault()
            e.stopPropagation()
            if (!showTodayScrobbles) {
              fetchTodayScrobbles()
            }
            setShowTodayScrobbles(!showTodayScrobbles)
          }

          const handleSaveSettings = async (e) => {
            e.preventDefault()
            e.stopPropagation()
            await dbStore.set('lastfm_username', usernameInput)
            await dbStore.set('lastfm_api_key', apiKeyInput)
            setLastfmUsername(usernameInput)
            setLastfmApiKey(apiKeyInput)
            setIsInlineSettingsOpen(false)
            if (window.addToast) {
              window.addToast('Last.fm credentials saved!', 'nf-md-check_circle')
            }
          }

          const toggleSettings = (e) => {
            e.preventDefault()
            e.stopPropagation()
            setIsInlineSettingsOpen(!isInlineSettingsOpen)
          }

          // 1. Measure overflow
          useEffect(() => {
            if (!textRef.current) return
            const checkOverflow = () => {
              if (!textRef.current) return
              const wrapper = textRef.current.parentElement
              if (!wrapper) return
              const wrapperWidth = wrapper.offsetWidth
              const textWidth = shouldScroll
                ? textRef.current.scrollWidth / 2
                : textRef.current.scrollWidth

              console.log('[Marquee Debug] Measuring:', {
                text: textRef.current.innerText,
                textWidth,
                wrapperWidth,
                shouldScroll,
                isOverflowing: textWidth > wrapperWidth,
              })

              setShouldScroll(textWidth > wrapperWidth)
            }

            const timer = setTimeout(checkOverflow, 120)
            window.addEventListener('resize', checkOverflow)
            return () => {
              clearTimeout(timer)
              window.removeEventListener('resize', checkOverflow)
            }
          }, [
            media.currentSession?.title,
            media.currentSession?.artist,
            shouldScroll,
            isInlineSettingsOpen,
          ])

          // 2. High-Performance Friction Deceleration Ticker
          useEffect(() => {
            console.log('[Marquee Debug] Ticker Setup:', {
              shouldScroll,
              isInlineSettingsOpen,
              hasTextRef: !!textRef.current,
            })

            if (!shouldScroll || isInlineSettingsOpen || !textRef.current) {
              posXRef.current = 0
              if (textRef.current) {
                textRef.current.style.transform = `translateX(0px)`
              }
              return
            }

            const textWidth = textRef.current.scrollWidth / 2
            const baseSpeed = Math.min(1.2, Math.max(0.4, textWidth / 350))

            console.log('[Marquee Debug] Ticker Started:', { textWidth, baseSpeed })

            let animId
            let lastTime = performance.now()

            const tick = (now) => {
              if (!textRef.current) return

              const dt = (now - lastTime) / 16.666

              if (isHovered) {
                // Exponential friction decay for luxury deceleration
                speedRef.current *= Math.pow(0.88, dt)
              } else {
                // Sleek acceleration back to baseSpeed
                speedRef.current = speedRef.current * Math.pow(0.9, dt) + baseSpeed * 0.1 * dt
              }

              posXRef.current -= speedRef.current * dt
              if (posXRef.current <= -textWidth) {
                posXRef.current += textWidth
              }

              textRef.current.style.transform = `translateX(${posXRef.current}px)`
              lastTime = now
              animId = requestAnimationFrame(tick)
            }

            animId = requestAnimationFrame(tick)
            return () => {
              console.log('[Marquee Debug] Ticker Stopped')
              cancelAnimationFrame(animId)
            }
          }, [isHovered, shouldScroll, isInlineSettingsOpen])

          const trackString = `${media.currentSession.title} - ${media.currentSession.artist}    •    `

          // Progress calculations for RPG Life-bar
          const position = media.currentSession?.position || 0
          const duration = media.currentSession?.duration || 1
          const progressPercent = Math.min(100, Math.max(0, (position / duration) * 100))
          const isFavorite = playCount && playCount >= 50

          return (
            <div
              ref={containerRef}
              className={`media-marquee-container ${isFavorite ? 'favorite-glow' : ''}`}
              onMouseEnter={() => setIsHovered(true)}
              onMouseLeave={() => setIsHovered(false)}
              style={{
                '--album-dominant-color': dominantColor,
                '--album-cover-url': albumCover ? `url(${albumCover})` : 'none',
              }}
            >
              {/* 4. Hover Media Controls (⏮ ⏸ ⏭) */}
              <div className="media-controls">
                <i
                  className="nf nf-md-skip_previous"
                  onClick={(e) => {
                    window.triggerRipple(e, 'rgba(232, 215, 255, 0.3)')
                    media.previous?.()
                  }}
                  title="Previous"
                ></i>
                <div
                  className="media-play-pause-btn"
                  onClick={(e) => {
                    window.triggerRipple(e, 'rgba(232, 215, 255, 0.3)')
                    media.togglePlayPause?.()
                  }}
                  title="Play/Pause"
                >
                  <i
                    className={`nf nf-md-pause pause-icon ${media.currentSession?.isPlaying ? 'visible' : 'hidden'}`}
                  ></i>
                  <i
                    className={`nf nf-md-play play-icon ${!media.currentSession?.isPlaying ? 'visible' : 'hidden'}`}
                  ></i>
                </div>
                <i
                  className="nf nf-md-skip_next"
                  onClick={(e) => {
                    window.triggerRipple(e, 'rgba(232, 215, 255, 0.3)')
                    media.next?.()
                  }}
                  title="Next"
                ></i>
              </div>

              {/* 1. Scrobble Stats Badge */}
              {lastfmApiKey && (
                <div
                  className="scrobble-stats-badge"
                  onContextMenu={handleStatsRightClick}
                  onClick={() => setShowTodayScrobbles(!showTodayScrobbles)}
                  title="Click: Toggle | Right-Click: Today's scrobbles"
                >
                  {showTodayScrobbles ? (
                    <>
                      <i className="nf nf-md-calendar_today"></i>
                      <span>{todayScrobbles !== null ? todayScrobbles : '...'}</span>
                    </>
                  ) : (
                    <>
                      <i className="nf nf-md-fire"></i>
                      <span>{playCount !== null ? playCount : '0'}</span>
                    </>
                  )}
                </div>
              )}

              {/* 3. Sliding Marquee VS Inline Settings Form */}
              {!isInlineSettingsOpen ? (
                <div
                  className="marquee-wrapper"
                  onContextMenu={toggleSettings}
                  title="Right click to configure Last.fm"
                  style={{ cursor: 'pointer' }}
                >
                  <span
                    ref={textRef}
                    className="media-marquee-text"
                    style={{
                      display: 'inline-block',
                      whiteSpace: 'nowrap',
                      animation: 'none',
                    }}
                  >
                    {shouldScroll ? (
                      <>
                        {trackString}
                        {trackString}
                      </>
                    ) : (
                      `${media.currentSession.title} - ${media.currentSession.artist}`
                    )}
                  </span>
                </div>
              ) : (
                <form
                  className="media-inline-settings-form"
                  onSubmit={handleSaveSettings}
                  onContextMenu={toggleSettings}
                  title="Right click to close"
                >
                  <input
                    type="text"
                    placeholder="User"
                    value={usernameInput}
                    onChange={(e) => setUsernameInput(e.target.value)}
                    required
                  />
                  <input
                    type="password"
                    placeholder="API Key"
                    value={apiKeyInput}
                    onChange={(e) => setApiKeyInput(e.target.value)}
                    required
                  />
                  <button type="submit" className="save-settings-btn">
                    <i className="nf nf-md-content_save"></i>
                  </button>
                </form>
              )}

              {/* 5. RPG-Style "Life-Bar" */}
              <div className="rpg-life-bar-container">
                <div
                  className={`rpg-life-bar ${isFavorite ? 'favorite-neon-pulsing' : 'standard-gray-flow'}`}
                  style={{ width: `${progressPercent}%` }}
                ></div>
              </div>
            </div>
          )
        },
        (prev, next) => {
          if (!prev.media?.currentSession || !next.media?.currentSession) {
            return prev.media?.currentSession === next.media?.currentSession
          }
          const p = prev.media.currentSession
          const n = next.media.currentSession
          return (
            p.title === n.title &&
            p.artist === n.artist &&
            p.isPlaying === n.isPlaying &&
            Math.floor((p.position || 0) / 1000) === Math.floor((n.position || 0) / 1000) &&
            prev.albumCover === next.albumCover &&
            prev.playCount === next.playCount &&
            prev.dominantColor === next.dominantColor &&
            prev.lastfmApiKey === next.lastfmApiKey &&
            prev.lastfmUsername === next.lastfmUsername
          )
        },
      )

      // Dedicated rotating album circular "baki island" component with macOS Dynamic Island expansion
      const MediaAlbumWidget = React.memo(
        ({ media, albumCover, dominantColor, albumName }) => {
          const hasSession = !!media?.currentSession
          const isPlaying = hasSession && media.currentSession.isPlaying

          // Progress calculations for 360-degree Interactive Track Progress Ring
          const position = media?.currentSession?.position || 0
          const duration =
            media?.currentSession?.duration ||
            media?.currentSession?.endTime - media?.currentSession?.startTime ||
            1
          const progressPercent = Math.min(100, Math.max(0, (position / duration) * 100))

          const radius = 10.5
          const circumference = 2 * Math.PI * radius // ~65.97

          const vinylRef = useRef(null)
          const ringBarRef = useRef(null)
          const vinylAnimInstance = useRef(null)

          // 1. Persistent Vinyl Record Spinner (Anime.js)
          useEffect(() => {
            if (!vinylRef.current || !hasSession) return

            const prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches

            if (prefersReduced) {
              anime.set(vinylRef.current, { rotate: '0deg' })
              return
            }

            const anim = anime({
              targets: vinylRef.current,
              rotate: '360deg',
              duration: 10000,
              loop: true,
              autoplay: isPlaying,
              easing: 'linear',
            })
            AnimationManager.register('album-vinyl-rotate', anim)
            vinylAnimInstance.current = anim

            return () => {
              AnimationManager.cleanup('album-vinyl-rotate')
              vinylAnimInstance.current = null
            }
          }, [hasSession])

          // 2. Playback State Synchronization
          useEffect(() => {
            if (!vinylAnimInstance.current) return

            if (isPlaying) {
              vinylAnimInstance.current.play()
            } else {
              vinylAnimInstance.current.pause()
            }
          }, [isPlaying])

          // 3. Instant Position Seeking on song seek (only when paused)
          useEffect(() => {
            if (!vinylAnimInstance.current || isPlaying) return
            const targetAngle = ((position % 10000) / 10000) * 360
            anime.set(vinylRef.current, { rotate: `${targetAngle}deg` })
          }, [position, isPlaying])

          // 4. Progress Ring SVG Stroke Anim
          useEffect(() => {
            if (!ringBarRef.current) return
            const targetOffset = circumference - (progressPercent / 100) * circumference

            const prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches

            if (prefersReduced) {
              anime.set(ringBarRef.current, { strokeDashoffset: targetOffset })
            } else {
              const anim = anime({
                targets: ringBarRef.current,
                strokeDashoffset: targetOffset,
                duration: 350,
                easing: EASINGS.liquid,
              })
              AnimationManager.register('album-progress-ring', anim)
            }

            return () => {
              AnimationManager.cleanup('album-progress-ring')
            }
          }, [progressPercent])

          return (
            <div
              className={`island-album ${hasSession ? 'active' : 'inactive'}`}
              onClick={(e) => hasSession && window.triggerRipple(e, 'rgba(255, 255, 255, 0.2)')}
              style={{
                '--album-dominant-color': dominantColor || 'rgba(255, 255, 255, 0.03)',
                '--island-glow-color': dominantColor ? dominantColor : 'rgba(255, 255, 255, 0.08)',
              }}
            >
              {hasSession && (
                <div className="album-glass-capsule">
                  <div ref={vinylRef} className="vinyl-wrapper">
                    {albumCover ? (
                      <img src={albumCover} className="vinyl-cover" alt="album art" />
                    ) : (
                      <div className="vinyl-placeholder">
                        <i className="nf nf-md-music_note" style={{ marginRight: 0 }}></i>
                      </div>
                    )}
                    <div className="vinyl-center-pin"></div>
                  </div>

                  {/* 360-degree SVG Track Progress Ring */}
                  <svg className="vinyl-progress-ring" viewBox="0 0 24 24">
                    <circle cx="12" cy="12" r={radius} className="vinyl-progress-ring-bg" />
                    <circle
                      ref={ringBarRef}
                      cx="12"
                      cy="12"
                      r={radius}
                      className="vinyl-progress-ring-bar"
                      style={{
                        strokeDasharray: circumference,
                        strokeDashoffset: circumference,
                      }}
                    />
                  </svg>

                  {albumName && <span className="album-name-hover-text">{albumName}</span>}

                  <div className="album-glass-glare"></div>
                </div>
              )}
            </div>
          )
        },
        (prev, next) => {
          if (!prev.media?.currentSession || !next.media?.currentSession) {
            return prev.media?.currentSession === next.media?.currentSession
          }
          const p = prev.media.currentSession
          const n = next.media.currentSession
          return (
            p.title === n.title &&
            p.artist === n.artist &&
            p.isPlaying === n.isPlaying &&
            Math.floor((p.position || 0) / 1000) === Math.floor((n.position || 0) / 1000) &&
            prev.albumCover === next.albumCover &&
            prev.dominantColor === next.dominantColor &&
            prev.albumName === next.albumName
          )
        },
      )
