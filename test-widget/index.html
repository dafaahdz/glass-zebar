      // Hidden Weather Preloader Component to force icon cache & avoid flickers
      const WeatherPreloader = () => {
        const weatherIcons = [
          'nf-weather-day_sunny',
          'nf-weather-night_clear',
          'nf-weather-day_cloudy',
          'nf-weather-night_alt_cloudy',
          'nf-weather-day_sprinkle',
          'nf-weather-night_alt_sprinkle',
          'nf-weather-day_rain',
          'nf-weather-night_alt_rain',
          'nf-weather-day_snow',
          'nf-weather-night_alt_snow',
          'nf-weather-day_lightning',
          'nf-weather-night_alt_lightning',
        ]
        return (
          <div
            style={{
              position: 'absolute',
              width: 0,
              height: 0,
              overflow: 'hidden',
              opacity: 0,
              pointerEvents: 'none',
            }}
          >
            {weatherIcons.map((icon) => (
              <i key={icon} className={`nf ${icon}`}></i>
            ))}
          </div>
        )
      }

      // Finite State Machine (FSM) configurations for Pomodoro statuses
      const POMODORO_STATES = {
        idle: {
          icon: 'nf-md-timer_sand',
          accentColor: 'var(--ctp-mocha-subtext0)',
          pulse: false,
        },
        work: {
          icon: 'nf-md-timer',
          accentColor: 'var(--kawaii-peach)',
          pulse: true,
        },
        gap: {
          icon: 'nf-md-timer_sand',
          accentColor: 'var(--kawaii-yellow)',
          pulse: true,
        },
        break: {
          icon: 'nf-md-coffee',
          accentColor: 'var(--kawaii-lavender)',
          pulse: true,
        },
      }

      // Pomodoro Widget Component (Memoized & fully powered by IndexedDB asinkron!)
      const PomodoroWidget = React.memo(() => {
        const [workTime, setWorkTime] = useState(25 * 60)
        const [breakTime, setBreakTime] = useState(5 * 60)
        const [autoStartBreak, setAutoStartBreak] = useState(false)
        const [breakGap, setBreakGap] = useState(15) // seconds

        const [timeLeft, setTimeLeft] = useState(25 * 60)
        const [mode, setMode] = useState('work') // 'work', 'gap', 'break'
        const [isActive, setIsActive] = useState(false)
        const [isDialogOpen, setIsDialogOpen] = useState(false)

        const pomodoroRef = useRef(null)
        const status = isActive ? mode : 'idle'
        const currentFsmState = POMODORO_STATES[status] || POMODORO_STATES.idle

        // Load settings asynchronously from IndexedDB
        useEffect(() => {
          const loadSettings = async () => {
            const sWork = await dbStore.get('pomodoro_setting_work')
            const sBreak = await dbStore.get('pomodoro_setting_break')
            const sAuto = await dbStore.get('pomodoro_setting_auto')
            const sGap = await dbStore.get('pomodoro_setting_gap')

            if (sWork) setWorkTime(parseInt(sWork))
            if (sBreak) setBreakTime(parseInt(sBreak))
            if (sAuto !== undefined) setAutoStartBreak(sAuto === 'true' || sAuto === true)
            if (sGap) setBreakGap(parseInt(sGap))

            const savedEndTime = await dbStore.get('pomodoro_end_time')
            const savedMode = await dbStore.get('pomodoro_mode', 'work')
            const savedIsActive =
              (await dbStore.get('pomodoro_active')) === 'true' ||
              (await dbStore.get('pomodoro_active')) === true

            if (savedIsActive && savedEndTime) {
              const remaining = Math.max(
                0,
                Math.floor((parseInt(savedEndTime) - Date.now()) / 1000),
              )
              if (remaining > 0) {
                setTimeLeft(remaining)
                setMode(savedMode)
                setIsActive(true)
              } else {
                await dbStore.remove('pomodoro_active')
              }
            } else {
              setMode(savedMode)
              const baseTime =
                savedMode === 'work'
                  ? sWork
                    ? parseInt(sWork)
                    : 25 * 60
                  : savedMode === 'gap'
                    ? sGap
                      ? parseInt(sGap)
                      : 15
                    : sBreak
                      ? parseInt(sBreak)
                      : 5 * 60
              setTimeLeft(baseTime)
            }
          }
          loadSettings()
        }, [])

        // Timer ticking loop
        useEffect(() => {
          let interval = null
          if (isActive) {
            interval = setInterval(() => {
              setTimeLeft((prev) => {
                if (prev <= 1) return 0
                return prev - 1
              })
            }, 1000)
          }
          return () => {
            if (interval) clearInterval(interval)
          }
        }, [isActive])

        // Timer completion triggers
        useEffect(() => {
          if (timeLeft !== 0 || !isActive) return

          const processCompletion = async () => {
            let nextMode = 'work'
            let nextTime = workTime
            let nextActive = false

            if (mode === 'work') {
              if (window.addToast) window.addToast('Focus session complete!', 'nf-md-party_popper')

              // High-performance background worker-thread canvas confetti burst!
              if (window.myConfetti) {
                window.myConfetti({
                  particleCount: 100,
                  spread: 70,
                  origin: { y: 0.6 },
                  colors: [
                    '#f5e0dc',
                    '#f2cdcd',
                    '#f5c2e7',
                    '#cba6f7',
                    '#89b4fa',
                    '#a6e3a1',
                    '#94e2d5',
                  ],
                })
              }

              if (autoStartBreak) {
                nextMode = 'gap'
                nextTime = breakGap
                nextActive = true
              } else {
                nextMode = 'break'
                nextTime = breakTime
                nextActive = false
              }
            } else if (mode === 'gap') {
              nextMode = 'break'
              nextTime = breakTime
              nextActive = true
            } else if (mode === 'break') {
              if (window.addToast) window.addToast('Break over! Back to work.', 'nf-md-coffee')
              nextMode = 'work'
              nextTime = workTime
              nextActive = false
            }

            setMode(nextMode)
            setTimeLeft(nextTime)
            setIsActive(nextActive)
            await dbStore.set('pomodoro_mode', nextMode)
            if (nextActive) {
              await dbStore.set('pomodoro_end_time', (Date.now() + nextTime * 1000).toString())
            } else {
              await dbStore.remove('pomodoro_active')
            }
          }
          processCompletion()
        }, [timeLeft === 0, isActive])

        // 3. Pomodoro FSM Pulsing Sequence (Anime.js)
        useEffect(() => {
          if (!pomodoroRef.current) return

          const prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches

          if (prefersReduced) {
            anime.set(pomodoroRef.current, { scale: 1.0 })
            return
          }

          if (currentFsmState.pulse && !isDialogOpen) {
            const anim = anime({
              targets: pomodoroRef.current,
              scale: [1, 1.025, 1],
              duration: 2000,
              loop: true,
              easing: 'easeInOutSine',
            })
            AnimationManager.register('pomodoro-pulse', anim)
          } else {
            const anim = anime({
              targets: pomodoroRef.current,
              scale: 1.0,
              duration: 300,
              easing: 'cubicBezier(0.16, 1, 0.3, 1)',
            })
            AnimationManager.register('pomodoro-pulse', anim)
          }

          return () => {
            AnimationManager.cleanup('pomodoro-pulse')
          }
        }, [status, isDialogOpen])

        const toggleTimer = async () => {
          if (isDialogOpen) return
          const newActive = !isActive
          setIsActive(newActive)
          if (newActive) {
            await dbStore.set('pomodoro_end_time', (Date.now() + timeLeft * 1000).toString())
            await dbStore.set('pomodoro_active', 'true')
          } else {
            await dbStore.remove('pomodoro_active')
          }
        }

        const resetTimer = async (e) => {
          e.preventDefault()
          if (isDialogOpen) return
          setIsActive(false)
          const time = mode === 'work' ? workTime : mode === 'gap' ? breakGap : breakTime
          setTimeLeft(time)
          await dbStore.remove('pomodoro_active')
        }

        const triggerNextState = async () => {
          let nextMode = 'work'
          let nextTime = workTime
          let nextActive = false

          if (mode === 'work') {
            if (window.addToast) window.addToast('Focus session skipped!', 'nf-md-skip_forward')
            if (autoStartBreak) {
              nextMode = 'gap'
              nextTime = breakGap
              nextActive = true
            } else {
              nextMode = 'break'
              nextTime = breakTime
              nextActive = false
            }
          } else if (mode === 'gap') {
            nextMode = 'break'
            nextTime = breakTime
            nextActive = true
          } else if (mode === 'break') {
            if (window.addToast) window.addToast('Break over! Back to work.', 'nf-md-coffee')
            nextMode = 'work'
            nextTime = workTime
            nextActive = false
          }

          setMode(nextMode)
          setTimeLeft(nextTime)
          setIsActive(nextActive)
          await dbStore.set('pomodoro_mode', nextMode)
          if (nextActive) {
            await dbStore.set('pomodoro_end_time', (Date.now() + nextTime * 1000).toString())
            await dbStore.set('pomodoro_active', 'true')
          } else {
            await dbStore.remove('pomodoro_active')
          }
        }

        useEffect(() => {
          const handleSkip = () => {
            triggerNextState()
          }
          document.addEventListener('pomodoro-skip', handleSkip)
          return () => document.removeEventListener('pomodoro-skip', handleSkip)
        }, [mode, workTime, breakTime, breakGap, autoStartBreak, timeLeft, isActive])

        const openDialog = (e) => {
          e.preventDefault()
          setIsDialogOpen(!isDialogOpen)
        }

        useEffect(() => {
          const prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches

          if (isDialogOpen) {
            if (prefersReduced) {
              anime.set('.inline-pomodoro-settings', {
                maxWidth: 370,
                marginLeft: 12,
                opacity: 1,
                scale: 1,
              })
            } else {
              anime.remove('.inline-pomodoro-settings')
              const anim = anime({
                targets: '.inline-pomodoro-settings',
                maxWidth: [0, 370],
                marginLeft: [0, 12],
                opacity: [0, 1],
                scale: [0.96, 1],
                duration: 850,
                easing: 'spring(1, 95, 15, 0)',
              })
              AnimationManager.register('pomodoro-settings', anim)
            }
          } else {
            if (prefersReduced) {
              anime.set('.inline-pomodoro-settings', {
                maxWidth: 0,
                marginLeft: 0,
                opacity: 0,
                scale: 0.96,
              })
            } else {
              anime.remove('.inline-pomodoro-settings')
              const anim = anime({
                targets: '.inline-pomodoro-settings',
                maxWidth: [370, 0],
                marginLeft: [12, 0],
                opacity: [1, 0],
                scale: [1, 0.96],
                duration: 650,
                easing: 'spring(1, 95, 15, 0)',
              })
              AnimationManager.register('pomodoro-settings', anim)
            }
          }

          return () => {
            AnimationManager.cleanup('pomodoro-settings')
          }
        }, [isDialogOpen])

        const formatTime = (seconds) => {
          const m = Math.floor(seconds / 60)
          const s = seconds % 60
          return `${m}:${s < 10 ? '0' : ''}${s}`
        }

        const saveSettings = async (e) => {
          e.preventDefault()
          const data = new FormData(e.target)
          const w = parseInt(data.get('work')) * 60
          const b = parseInt(data.get('break')) * 60
          const g = parseInt(data.get('gap'))
          const auto = data.get('auto') === 'on'

          setWorkTime(w)
          setBreakTime(b)
          setBreakGap(g)
          setAutoStartBreak(auto)

          await dbStore.set('pomodoro_setting_work', w.toString())
          await dbStore.set('pomodoro_setting_break', b.toString())
          await dbStore.set('pomodoro_setting_gap', g.toString())
          await dbStore.set('pomodoro_setting_auto', auto.toString())

          if (!isActive) {
            const time = mode === 'work' ? w : mode === 'gap' ? g : b
            setTimeLeft(time)
          }

          // Trigger rotating sage-green checkmark feedback sequence before drawer closes
          const btn = e.target.querySelector('.dialog-save')
          if (btn) {
            btn.classList.add('success-mode')
            btn.innerHTML = `<i class="nf nf-md-check_circle" style="transform: rotate(0deg); display: inline-block;"></i> Saved`

            anime({
              targets: btn.querySelector('i'),
              rotate: 360,
              duration: 800,
              easing: 'easeOutElastic(1, 0.75)',
            })
          }

          setTimeout(() => {
            setIsDialogOpen(false)
            if (btn) {
              btn.classList.remove('success-mode')
              btn.innerHTML = 'Save'
            }
          }, 900)
        }

        const getEnergyLevel = () => {
          if (mode === 'work') return (timeLeft / workTime) * 100
          if (mode === 'break') return ((breakTime - timeLeft) / breakTime) * 100
          return 0
        }
        const energyLevel = getEnergyLevel()

        return (
          <div className="pomodoro-container" style={{ position: 'relative' }}>
            <div
              ref={pomodoroRef}
              onClick={toggleTimer}
              onContextMenu={openDialog}
              onAuxClick={(e) => e.button === 1 && resetTimer(e)}
              title="Left: Start/Pause | Middle: Reset | Right: Settings"
              style={{ transformOrigin: 'center' }}
            >
              <StatusPill
                className={`pomodoro ${mode} ${isDialogOpen ? 'expanded' : ''} ${isDialogOpen ? 'no-peel' : ''} ${isActive ? 'active-timer' : ''}`}
                icon={currentFsmState.icon}
                value={formatTime(timeLeft)}
                style={{
                  opacity: isActive ? 1 : 0.7,
                  '--charge-level': `${energyLevel}%`,
                  '--pill-color': currentFsmState.accentColor,
                }}
                extraContent={
                  <>
                    <div className="battery-liquid-container">
                      <div
                        className={`battery-liquid ${
                          mode === 'break'
                            ? 'battery-charging'
                            : energyLevel > 50
                              ? 'battery-high'
                              : energyLevel > 20
                                ? 'battery-warning'
                                : 'battery-critical'
                        }`}
                      ></div>
                    </div>
                    {mode === 'break' && isActive && (
                      <i
                        className="nf nf-md-power_plug charging-icon"
                        style={{ zIndex: 1, color: 'var(--kawaii-lavender)' }}
                      ></i>
                    )}
                  </>
                }
                appendContent={
                  <div
                    className="inline-pomodoro-settings"
                    onClick={(e) => e.stopPropagation()}
                    onContextMenu={(e) => e.stopPropagation()}
                  >
                    <form onSubmit={saveSettings}>
                      <label>
                        Work:{' '}
                        <input
                          type="number"
                          name="work"
                          defaultValue={workTime / 60}
                          min="1"
                          max="120"
                        />
                      </label>
                      <label>
                        Break:{' '}
                        <input
                          type="number"
                          name="break"
                          defaultValue={breakTime / 60}
                          min="1"
                          max="60"
                        />
                      </label>
                      <label className="checkbox-label">
                        <input
                          type="checkbox"
                          name="auto"
                          checked={autoStartBreak}
                          onChange={async (e) => {
                            setAutoStartBreak(e.target.checked)
                            await dbStore.set('pomodoro_setting_auto', e.target.checked.toString())
                          }}
                        />{' '}
                        Auto
                      </label>
                      <label>
                        Gap:{' '}
                        <input type="number" name="gap" defaultValue={breakGap} min="0" max="300" />
                        s
                      </label>
                      <button type="submit" className="dialog-save">
                        Save
                      </button>
                      <button
                        type="button"
                        className="dialog-cancel"
                        onClick={(e) => {
                          e.preventDefault()
                          e.stopPropagation()
                          setIsDialogOpen(false)
                        }}
                      >
                        Close
                      </button>
                    </form>
                  </div>
                }
              />
            </div>
          </div>
        )
      })

      class ErrorBoundary extends React.Component {
        constructor(props) {
          super(props)
          this.state = { hasError: false }
        }
        static getDerivedStateFromError(error) {
          return { hasError: true }
        }
        componentDidCatch(error, errorInfo) {
          console.error('Widget Error:', error, errorInfo)
          if (window.logAppError) {
            window.logAppError(`Widget Error: ${error?.message || error}`)
          }
        }
        render() {
          if (this.state.hasError) {
            return (
              <div
                className="status-pill"
                style={{
                  '--pill-color': 'var(--ctp-mocha-red)',
                  background: 'var(--ctp-mocha-crust)',
                }}
              >
                <i className="nf nf-md-alert_circle"></i>
                <span className="value" style={{ color: 'var(--ctp-mocha-red)' }}>
                  [Error]
                </span>
              </div>
            )
          }
          return this.props.children
        }
      }

      const ToastItem = React.memo(({ toast, onRemove }) => {
        const elRef = useRef(null)
        const progressBarRef = useRef(null)
        const progressAnimRef = useRef(null)

        const isDragging = useRef(false)
        const startY = useRef(0)
        const currentY = useRef(0)

        useEffect(() => {
          if (elRef.current) {
            anime({
              targets: elRef.current,
              translateY: [-40, 0],
              opacity: [0, 1],
              scale: [0.85, 1],
              duration: 700,
              easing: 'easeOutElastic(1, 0.75)',
            })
          }

          if (progressBarRef.current) {
            progressAnimRef.current = anime({
              targets: progressBarRef.current,
              width: ['100%', '0%'],
              duration: 5000,
              easing: 'linear',
              complete: () => {
                if (elRef.current) {
                  anime({
                    targets: elRef.current,
                    translateY: -50,
                    opacity: 0,
                    scale: 0.9,
                    duration: 400,
                    easing: 'easeInBack',
                    complete: () => {
                      onRemove(toast.id)
                    }
                  })
                } else {
                  onRemove(toast.id)
                }
              }
            })
          }

          return () => {
            if (progressAnimRef.current) {
              progressAnimRef.current.pause()
            }
          }
        }, [])

        const handlePointerDown = (e) => {
          isDragging.current = true
          startY.current = e.clientY
          if (progressAnimRef.current) {
            progressAnimRef.current.pause()
          }
          if (elRef.current) {
            elRef.current.style.transition = 'none'
          }
        }

        const handlePointerMove = (e) => {
          if (!isDragging.current || !elRef.current) return
          const deltaY = e.clientY - startY.current
          // Only allow dragging upwards to dismiss
          if (deltaY < 0) {
            currentY.current = deltaY
            elRef.current.style.transform = `translateY(${deltaY}px) rotate(${deltaY * 0.08}deg)`
            elRef.current.style.opacity = Math.max(0, 1 + deltaY / 100)
          }
        }

        const handlePointerUp = () => {
          if (!isDragging.current) return
          isDragging.current = false

          if (currentY.current < -35 && elRef.current) {
            // High speed upward fling dismiss
            anime({
              targets: elRef.current,
              translateY: -200,
              rotate: -15,
              opacity: 0,
              duration: 300,
              easing: 'easeInQuad',
              complete: () => {
                onRemove(toast.id)
              },
            })
          } else if (elRef.current) {
            // Return back to origin
            anime({
              targets: elRef.current,
              translateY: 0,
              rotate: 0,
              opacity: 1,
              duration: 400,
              easing: 'easeOutElastic(1, 0.75)',
              complete: () => {
                if (progressAnimRef.current) {
                  progressAnimRef.current.play()
                }
              }
            })
          }
          currentY.current = 0
        }

        const handleMouseEnter = () => {
          if (progressAnimRef.current) {
            progressAnimRef.current.pause()
          }
        }

        const handleMouseLeave = () => {
          if (progressAnimRef.current && !isDragging.current) {
            progressAnimRef.current.play()
          }
        }

        return (
          <div
            ref={elRef}
            className="toast"
            onPointerDown={handlePointerDown}
            onPointerMove={handlePointerMove}
            onPointerUp={handlePointerUp}
            onPointerLeave={handlePointerUp}
            onMouseEnter={handleMouseEnter}
            onMouseLeave={handleMouseLeave}
            style={{ cursor: 'grab' }}
          >
            <div className="sparkles-container">
              <span className="sparkle s1" style={{ '--tx': '-20px', '--ty': '-20px' }}>
                ✦
              </span>
              <span className="sparkle s2" style={{ '--tx': '25px', '--ty': '15px' }}>
                ✧
              </span>
              <span className="sparkle s3" style={{ '--tx': '-15px', '--ty': '25px' }}>
                ✦
              </span>
              <span className="sparkle s4" style={{ '--tx': '20px', '--ty': '-15px' }}>
                ✧
              </span>
            </div>
            <i className={`nf ${toast.icon}`}></i>
            <span>{toast.message}</span>
            <div
              ref={progressBarRef}
              className="toast-progress"
              style={{ animation: 'none', width: '100%' }}
            ></div>
          </div>
        )
      })

            }
          }

          return () => {
            AnimationManager.cleanup('app-arch')
            AnimationManager.cleanup('app-quick-actions')
            AnimationManager.cleanup('app-action-btn')
          }
        }, [isTrayOpen])

        // Activate Konami Code Easter Egg
        useKonamiEasterEgg()

        // Lifted Last.fm States
        const [lastfmUsername, setLastfmUsername] = useState('')
        const [lastfmApiKey, setLastfmApiKey] = useState('')
        const [albumCover, setAlbumCover] = useState(null)
        const [playCount, setPlayCount] = useState(null)
        const [dominantColor, setDominantColor] = useState('rgba(255, 255, 255, 0.03)')
        const [albumName, setAlbumName] = useState('')

        // Load credentials from IndexedDB on startup
        useEffect(() => {
          const loadSettings = async () => {
            const user = await dbStore.get('lastfm_username', '')
            const key = await dbStore.get('lastfm_api_key', '')
            setLastfmUsername(user)
            setLastfmApiKey(key)
          }
          loadSettings()
        }, [])

        // Fetch artwork, playcount, and extract dominant color on track/credentials change
        const fetchedTrackRef = useRef('')
        const fetchedKeyRef = useRef('')
        useEffect(() => {
          const title = output.media?.currentSession?.title
          const artist = output.media?.currentSession?.artist
          if (!title || !artist) return

          const cleanArtist = cleanMetadata(artist)
          const cleanTitle = cleanMetadata(title)
          const trackKey = `${cleanTitle}-${cleanArtist}`

          // Only fetch if track or key has changed to prevent infinite-spamming rate limits
          if (fetchedTrackRef.current === trackKey && fetchedKeyRef.current === lastfmApiKey) return
          fetchedTrackRef.current = trackKey
          fetchedKeyRef.current = lastfmApiKey

          const fetchTrackInfo = async () => {
            if (!lastfmApiKey) {
              setAlbumCover(null)
              setPlayCount(null)
              setDominantColor('rgba(255, 255, 255, 0.03)')
              setAlbumName('')
              return
            }

            const cacheKey = `lfm_cache_${cleanArtist}_${cleanTitle}`.toLowerCase().replace(/[^a-z0-9_]/g, '_')
            try {
              const cachedData = await dbStore.get(cacheKey)
              if (cachedData) {
                console.log('[Last.fm] Cache hit:', cachedData)
                setAlbumCover(cachedData.cover)
                setDominantColor(cachedData.color)
                setAlbumName(cachedData.albumTitle)
                if (cachedData.playCount !== undefined) {
                  setPlayCount(cachedData.playCount)
                }
              }
            } catch (err) {
              console.error('[Last.fm] Cache read error:', err)
            }

            try {
              console.log(
                `[Last.fm] Fetching track: "${cleanTitle}" by "${cleanArtist}" for user "${lastfmUsername}" (raw: "${title}" by "${artist}")`,
              )
              const url = `https://ws.audioscrobbler.com/2.0/?method=track.getInfo&api_key=${lastfmApiKey}&artist=${encodeURIComponent(cleanArtist)}&track=${encodeURIComponent(cleanTitle)}&username=${lastfmUsername}&format=json`
              const res = await fetch(url)
              const data = await res.json()
              console.log('[Last.fm] Response data:', data)

              if (data?.track) {
                const trackInfo = data.track
                const images = trackInfo.album?.image
                const cover = images?.[images.length - 1]?.['#text'] || null
                const pc = trackInfo.userplaycount ? parseInt(trackInfo.userplaycount) : null
                const albumTitle = trackInfo.album?.title || ''

                setAlbumCover(cover)
                setPlayCount(pc)
                setAlbumName(albumTitle)

                let color = 'rgba(255, 255, 255, 0.03)'
                if (cover) {
                  color = await extractDominantColor(cover)
                  setDominantColor(color)
                } else {
                  setDominantColor(color)
                }

                // Save to cache
                const cacheData = {
                  cover,
                  color,
                  albumTitle,
                  playCount: pc,
                }
                await dbStore.set(cacheKey, cacheData)
                console.log('[Last.fm] Saved to cache:', cacheData)

                // Celebrate Milestones with beautiful Toast and Canvas Confetti!
                if (pc && pc > 0) {
                  const isMilestone = pc === 10 || pc === 50 || (pc > 0 && pc % 100 === 0)
                  if (isMilestone && window.addToast && window.myConfetti) {
                    window.addToast(
                      `Milestone: ${pc} scrobbles for "${trackInfo.name}"!`,
                      'nf-md-party_popper',
                    )
                    window.myConfetti({
                      particleCount: 80,
                      spread: 60,
                      origin: { y: 0.6 },
                      colors: [
                        '#f5e0dc',
                        '#f2cdcd',
                        '#f5c2e7',
                        '#cba6f7',
                        '#89b4fa',
                        '#a6e3a1',
                        '#94e2d5',
                      ],
                    })
                  }
                }
              } else {
                if (data?.error) {
                  console.error('[Last.fm] API Error:', data.message || data.error)
                }
                setAlbumCover(null)
                setPlayCount(null)
                setDominantColor('rgba(255, 255, 255, 0.03)')
                setAlbumName('')
              }
            } catch (err) {
              console.error('[Last.fm] Error fetching track details:', err)
              setAlbumCover(null)
              setPlayCount(null)
              setDominantColor('rgba(255, 255, 255, 0.03)')
              setAlbumName('')
            }
          }

          fetchTrackInfo()
        }, [
          output.media?.currentSession?.title,
          output.media?.currentSession?.artist,
          lastfmApiKey,
          lastfmUsername,
        ])

        // Global Error Log Listeners
        useEffect(() => {
          const handleError = (event) => {
            const errorMsg = event.error?.message || event.message || 'Unknown runtime error'
            setErrors((prev) => [...new Set([...prev, errorMsg])].slice(-3))
          }

          const handleRejection = (event) => {
            const errorMsg = event.reason?.message || event.reason || 'Unhandled rejection'
            setErrors((prev) => [...new Set([...prev, errorMsg])].slice(-3))
          }

          window.addEventListener('error', handleError)
          window.addEventListener('unhandledrejection', handleRejection)

          window.logAppError = (msg) => {
            setErrors((prev) => [...new Set([...prev, msg])].slice(-3))
          }

          return () => {
            window.removeEventListener('error', handleError)
            window.removeEventListener('unhandledrejection', handleRejection)
            delete window.logAppError
          }
        }, [])

        // Initial entrance sequence of Floating Archipelago + Staggered Capsules
        useEffect(() => {
          const prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches

          if (prefersReduced) {
            anime.set('.island-arch', { translateX: 0, opacity: 1, scale: 1 })
            anime.set('.island-left', { translateX: 0, opacity: 1, scale: 1 })
            anime.set('.island-center', { translateY: 0, opacity: 1, scale: 1 })
            anime.set('.island-album', { translateY: 0, opacity: 1, scale: 1 })
            anime.set('.island-right', { translateX: 0, opacity: 1, scale: 1 })
            anime.set(
              '.island-arch > .arch-glass-capsule, .island-left > *, .island-center > *, .island-album > *, .island-right > *',
              { scale: 1, opacity: 1 }
            )
          } else {
            const archAnim = anime({
              targets: '.island-arch',
              translateX: [-150, 0],
              opacity: [0, 1],
              scale: [0.8, 1],
              easing: 'easeOutElastic(1, 0.85)',
              duration: 1200,
              delay: 50,
            })
            AnimationManager.register('entrance-arch', archAnim)

            const leftAnim = anime({
              targets: '.island-left',
              translateX: [-120, 0],
              opacity: [0, 1],
              scale: [0.9, 1],
              easing: 'easeOutElastic(1, 0.85)',
              duration: 1200,
              delay: 150,
            })
            AnimationManager.register('entrance-left', leftAnim)

            const centerAnim = anime({
              targets: '.island-center',
              translateY: [-60, 0],
              opacity: [0, 1],
              scale: [0.92, 1],
              easing: 'easeOutElastic(1, 0.85)',
              duration: 1300,
              delay: 250,
            })
            AnimationManager.register('entrance-center', centerAnim)

            const albumAnim = anime({
              targets: '.island-album',
              translateY: [-60, 0],
              opacity: [0, 1],
              scale: [0.92, 1],
              easing: 'easeOutElastic(1, 0.85)',
              duration: 1300,
              delay: 300,
            })
            AnimationManager.register('entrance-album', albumAnim)

            const rightAnim = anime({
              targets: '.island-right',
              translateX: [120, 0],
              opacity: [0, 1],
              scale: [0.9, 1],
              easing: 'easeOutElastic(1, 0.85)',
              duration: 1200,
              delay: 380,
            })
            AnimationManager.register('entrance-right', rightAnim)

            const staggerAnim = anime({
              targets:
                '.island-arch > .arch-glass-capsule, .island-left > *, .island-center > *, .island-album > *, .island-right > *',
              scale: [0.75, 1],
              opacity: [0, 1],
              delay: anime.stagger(40, { start: 650 }),
              easing: 'easeOutBack',
              duration: 600,
            })
            AnimationManager.register('entrance-stagger', staggerAnim)
          }

          return () => {
            AnimationManager.cleanup('entrance-arch')
            AnimationManager.cleanup('entrance-left')
            AnimationManager.cleanup('entrance-center')
            AnimationManager.cleanup('entrance-album')
            AnimationManager.cleanup('entrance-right')
            AnimationManager.cleanup('entrance-stagger')
          }
        }, [])

        // Initialize Canvas Confetti to use a background Web Worker (OffscreenCanvas)
        useEffect(() => {
          if (confettiRef.current) {
            window.myConfetti = confetti.create(confettiRef.current, {
              resize: true,
              useWorker: true,
            })
          }
        }, [])

        const [toasts, setToasts] = useState([])

        useEffect(() => {
          window.addToast = (message, icon) => {
            const id = Date.now()
            setToasts((prev) => [...prev, { id, message, icon }])
          }
        }, [])

        const palette = PALETTES[activePaletteIndex]
        const appStyle = {
          '--kawaii-teal': palette.teal,
          '--kawaii-lavender': palette.lavender,
          '--kawaii-peach': palette.peach,
          '--kawaii-yellow': palette.yellow,
          '--kawaii-green': palette.green,
          '--island-glow-color': palette.glow,
        }

        return (
          <div className="app" style={appStyle}>
            {isVignetteActive && <div className="cyber-vignette-overlay" />}
            <DebugOverlay />
            <WeatherPreloader />
            {/* High-Performance Offscreen Canvas for Worker Confetti with strict layout containment */}
            <canvas
              ref={confettiRef}
              style={{
                position: 'fixed',
                inset: 0,
                width: '100vw',
                height: '100vh',
                pointerEvents: 'none',
                zIndex: 9999,
                contain: 'strict',
              }}
            />

            <div className="toast-container">
              {toasts.map((toast) => (
                <ToastItem
                  key={toast.id}
                  toast={toast}
                  onRemove={(id) => setToasts((prev) => prev.filter((t) => t.id !== id))}
                />
              ))}
            </div>

            <div className="left" style={{ gap: '6px' }}>
              <div
                className={`island-arch ${isTrayOpen ? 'expanded' : ''}`}
                onContextMenu={handleRightClick}
                onClick={handleLeftClick}
                title="Arch Linux (Right-click for Quick Actions)"
              >
                <div className="arch-glass-capsule">
                  <i className="nf nf-md-arch" style={{ marginRight: 0 }}></i>
                </div>

                <div className="arch-quick-actions">
                  <button
                    className={`action-btn love-btn ${isLoved ? 'active' : ''}`}
                    onClick={toggleLove}
                  >
                    <i className={`nf ${isLoved ? 'nf-md-heart' : 'nf-md-heart_outline'}`}></i>
                    <span className="action-btn-text">Love Track</span>
                  </button>

                  <button className="action-btn skip-btn" onClick={skipPomodoro}>
                    <i className="nf nf-md-skip_forward"></i>
                    <span className="action-btn-text">Skip Pomodoro</span>
                  </button>

                  <button className="action-btn sync-btn" onClick={forceSyncWeather}>
                    <i className="nf nf-md-autorenew"></i>
                    <span className="action-btn-text">Sync Weather</span>
                  </button>

                  <button
                    className={`action-btn vignette-btn ${isVignetteActive ? 'active' : ''}`}
                    onClick={toggleVignette}
                  >
                    <i className="nf nf-md-vignette"></i>
                    <span className="action-btn-text">Toggle Vignette</span>
                  </button>

                  <button className="action-btn palette-btn" onClick={cyclePalette}>
                    <i className="nf nf-md-palette"></i>
                    <span className="action-btn-text">Cycle Palette</span>
                  </button>
                </div>
              </div>

              <div className="left island-left" style={{ margin: 0, '--island-glow-color': 'rgba(52, 211, 153, 0.25)' }}>
                <WorkspaceWidget glazewm={output.glazewm} />
                <GlazeControlsWidget glazewm={output.glazewm} />
                <GlazeWindowWidget glazewm={output.glazewm} />
              </div>
            </div>

            <div className="center" style={{ gap: '6px' }}>
              <div className="island-center" style={{ '--island-glow-color': 'rgba(245, 158, 11, 0.2)' }}>
                {errors.length > 0 ? (
                  <div
                    className="error-log-pill status-pill"
                    onClick={() => {
                      const text = errors.join('\n')
                      navigator.clipboard.writeText(text)
                      if (window.addToast)
                        window.addToast('Errors copied to clipboard!', 'nf-md-clipboard_check')
                    }}
                    title={errors.join(' | ') + ' (Click to Copy)'}
                    style={{
                      display: 'inline-flex',
                      alignItems: 'center',
                      gap: '4px',
                      background: 'rgba(244, 63, 94, 0.15)',
                      border: '1px solid #f43f5e',
                      color: '#f43f5e',
                      padding: '0 12px',
                      borderRadius: '9999px',
                      fontSize: '11px',
                      fontFamily: "'Outfit', sans-serif",
                      fontWeight: 'bold',
                      cursor: 'pointer',
                      animation: 'pulse 1.5s infinite',
                      height: '24px',
                    }}
                  >
                    <i
                      className="nf nf-md-alert_circle"
                      style={{ marginRight: 0, color: '#f43f5e' }}
                    ></i>
                    <span>ERR ({errors.length})</span>
                  </div>
                ) : (
                  <div
                    className="status-ok-dot status-pill"
                    title="System Status: All Operational"
                    style={{
                      display: 'inline-flex',
                      alignItems: 'center',
                      background: 'rgba(52, 211, 153, 0.15)',
                      border: '1px solid #34d399',
                      color: '#34d399',
                      padding: '0 8px',
                      borderRadius: '9999px',
                      fontSize: '12px',
                      height: '24px',
                    }}
                  >
                    <i
                      className="nf nf-md-heart_pulse"
                      style={{ marginRight: 0, fontSize: '12px', color: '#34d399' }}
                    ></i>
                  </div>
                )}
                <ClockWidget date={output.date} />
                <MediaWidget
                  media={output.media}
                  lastfmUsername={lastfmUsername}
                  setLastfmUsername={setLastfmUsername}
                  lastfmApiKey={lastfmApiKey}
                  setLastfmApiKey={setLastfmApiKey}
                  albumCover={albumCover}
                  playCount={playCount}
                  dominantColor={dominantColor}
                />
              </div>

              <MediaAlbumWidget
                media={output.media}
                albumCover={albumCover}
                dominantColor={dominantColor}
                albumName={albumName}
              />
            </div>

            <div className="right island-right" style={{ '--island-glow-color': 'rgba(139, 92, 246, 0.25)' }}>
              <ErrorBoundary>
                <PomodoroWidget />
              </ErrorBoundary>
              <ErrorBoundary>
                <CpuWidget cpu={output.cpu} />
              </ErrorBoundary>
              <ErrorBoundary>
                <MemoryWidget memory={output.memory} />
              </ErrorBoundary>
              <ErrorBoundary>
                <BatteryWidget battery={output.battery} />
              </ErrorBoundary>
              <ErrorBoundary>
                <NetworkWidget network={output.network} />
              </ErrorBoundary>
              <ErrorBoundary>
                <WeatherWidget weather={output.weather} />
              </ErrorBoundary>
            </div>
          </div>
        )
      }

      createRoot(document.getElementById('root')).render(<App />)
    </script>
  </body>
</html>
